<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صالة عروض الأصول الاستثمارية المتاحة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-main: #0b1329;
            --bg-card: #1c2541;
            --border-color: #2e3c63;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            padding: 16px; 
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        h1 { 
            text-align: center; 
            color: var(--text-primary); 
            margin: 20px 0 5px 0; 
            font-size: 1.6rem; 
            font-weight: 800; 
        }

        p.subtitle { 
            text-align: center; 
            color: var(--text-secondary); 
            font-size: 12px; 
            margin-bottom: 25px; 
        }

        .properties-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .property-card { 
            background: var(--bg-card); 
            border-radius: 14px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-color); 
        }
        
        .media-viewer { 
            position: relative; 
            width: 100%; 
            height: 220px; 
            background: #090f1f; 
        }
        
        .property-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            cursor: pointer;
        }

        .media-badge { 
            position: absolute; 
            top: 12px; 
            left: 12px; 
            background: rgba(11, 19, 41, 0.85); 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-size: 11px; 
            color: var(--accent-gold); 
            font-weight: bold; 
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        
        .property-details { 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            flex-grow: 1; 
        }

        .tag { 
            font-size: 11px; 
            background: rgba(16, 185, 129, 0.15); 
            color: var(--accent-green); 
            padding: 4px 8px; 
            border-radius: 4px; 
            align-self: flex-start; 
            margin-bottom: 10px; 
            font-weight: 600; 
        }

        .property-price { 
            color: var(--accent-gold); 
            font-size: 22px; 
            font-weight: 800; 
            margin-bottom: 6px; 
        }

        .property-title { 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--text-primary); 
            margin: 0 0 12px 0; 
            line-height: 1.5;
        }
        
        .property-meta { 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-top: 1px solid rgba(46, 60, 99, 0.5); 
            padding-top: 12px; 
        }

        .meta-item { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        
        .thumbnails-strip { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 4px 2px 12px 2px; 
            margin-bottom: 12px; 
            scrollbar-width: none; 
        }
        .thumbnails-strip::-webkit-scrollbar { display: none; }
        
        .thumb-box { 
            width: 48px; height: 48px; border-radius: 6px; object-fit: cover; 
            cursor: pointer; border: 2px solid transparent; opacity: 0.5; transition: all 0.2s ease; flex-shrink: 0; 
        }
        .thumb-box.active { border-color: var(--accent-gold); opacity: 1; }

        .action-row { display: flex; gap: 10px; margin-top: auto; }
        
        .btn-action {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 12px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 700; border: none; cursor: pointer;
        }
        .btn-whatsapp { flex: 2; background: var(--accent-green); color: #ffffff; }
        .btn-map { flex: 1; background: var(--accent-blue); color: #ffffff; }
        
        /* النوافذ المنبثقة للصور والخريطة الهجينة */
        .lightbox-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(7, 11, 21, 0.95); z-index: 9999; justify-content: center; align-items: center; 
        }
        
        .lightbox-content { max-width: 95%; max-height: 80%; object-fit: contain; border-radius: 6px; }

        .map-popup-container {
            background: var(--bg-card);
            width: 92%;
            max-width: 440px;
            height: 490px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #popupMap { width: 100%; flex-grow: 1; background: #141926; }

        .popup-map-title {
            padding: 16px;
            font-size: 14px;
            font-weight: 800;
            color: var(--accent-gold);
            border-bottom: 1px solid var(--border-color);
            margin: 0;
            text-align: center;
            background: var(--bg-main);
        }

        .map-external-routing {
            padding: 14px;
            background: var(--bg-main);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .btn-route-external {
            padding: 13px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--accent-gold);
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .btn-route-external:hover {
            background: var(--accent-gold);
            color: var(--bg-main);
        }

        .lightbox-close { 
            position: absolute; top: 16px; right: 16px; font-size: 20px; 
            color: var(--accent-gold); cursor: pointer; background: #1c2541; 
            width: 38px; height: 38px; display: flex; align-items: center; 
            justify-content: center; border-radius: 50%; border: 1px solid var(--border-color); z-index: 10000;
        }

        .pulse-marker {
            position: relative;
        }
        .pulse-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: rgba(245, 158, 11, 0.4);
            border-radius: 50%;
            animation: mapPulse 1.5s infinite ease-out;
            z-index: -1;
        }
        @keyframes mapPulse {
            0% { width: 14px; height: 14px; opacity: 1; }
            100% { width: 45px; height: 45px; opacity: 0; }
        }
        
        .loading-text { text-align: center; font-size: 14px; color: var(--text-secondary); grid-column: 1 / -1; padding: 60px; }
    </style>
</head>
<body>

    <h1>صالة عروض الأصول الاستثمارية المتاحة</h1>
    <p class="subtitle">مساحة تفاعلية حية ومحدثة من قبل إدارة المحتوى مباشرة</p>
    
    <div class="properties-container" id="saudiClientWrapper">
        <div class="loading-text"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري فحص وتحديث المعروضات الحية بالمحفظة...</div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></span>
        <img class="lightbox-content" id="lightboxImg" src="">
    </div>

    <div class="lightbox-overlay" id="mapOverlay">
        <span class="lightbox-close" onclick="closeMapPopup()"><i class="fa-solid fa-xmark"></i></span>
        <div class="map-popup-container">
            <h3 class="popup-map-title" id="popupMapTitle">الموقع الجغرافي</h3>
            <div id="popupMap"></div>
            
            <div class="map-external-routing">
                <a href="#" target="_blank" id="lnkGoogleMaps" class="btn-route-external">
                    <i class="fa-solid fa-location-arrow"></i> فتح واشتقاق الاتجاهات عبر Google Maps
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let globalPopupMap = null;
        let globalPopupMarker = null;

        function loadSaudiProperties() {
            const wrapper = document.getElementById('saudiClientWrapper');
            wrapper.innerHTML = '';
            
            const currentData = localStorage.getItem('saudi_property_vault');
            const dataArray = currentData ? JSON.parse(currentData) : [];
            
            if (dataArray.length === 0) {
                wrapper.innerHTML = `<div class="loading-text">لا توجد عروض منشورة في صالة المبيعات حالياً.</div>`;
                return;
            }
            
            dataArray.forEach(item => {
                const card = document.createElement('div');
                card.className = 'property-card';
                
                const validTitle = item.title || 'فيلا مودرن فاخرة';
                const validPrice = item.price ? Number(item.price).toLocaleString() : 'اتصل لمعرفة السعر';
                const validLocation = item.location || 'المملكة العربية السعودية';
                const validArea = item.area ? item.area : '---';

                const mediaList = item.media_list && item.media_list.length > 0 ? item.media_list : [{ type: 'image', data: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80' }];
                const firstMedia = mediaList[0];
                const viewerId = `viewer_${item.id}`;
                
                let mainMediaHtml = `<img id="${viewerId}" src="${firstMedia.data}" class="property-img" onclick="openLightbox('${firstMedia.data}')" alt="عقار">`;

                let thumbnailsHtml = '';
                if(mediaList.length > 1) {
                    thumbnailsHtml += `<div class="thumbnails-strip">`;
                    mediaList.forEach((media, idx) => {
                        thumbnailsHtml += `<img src="${media.data}" class="thumb-box ${idx === 0 ? 'active' : ''}" onclick="switchCardMedia('${viewerId}', '${media.data}', this)">`;
                    });
                    thumbnailsHtml += `</div>`;
                }

                const whatsappUrl = `https://wa.me/${item.phone || '96650000000'}?text=${encodeURIComponent('استفسار عن: ' + validTitle)}`;
                
                const propertyLat = item.lat ? parseFloat(item.lat) : 24.7136;
                const propertyLng = item.lng ? parseFloat(item.lng) : 46.6753;

                card.innerHTML = `
                    <div class="media-viewer">
                        ${mainMediaHtml}
                        <div class="media-badge"><i class="fa-solid fa-image"></i> وسائط: ${mediaList.length}</div>
                    </div>
                    <div class="property-details">
                        <span class="tag">عرض متاح للاستثمار</span>
                        <div class="property-price">${validPrice} ر.س</div>
                        <h3 class="property-title">${validTitle}</h3>
                        <div class="property-meta">
                            <span class="meta-item"><i class="fa-solid fa-location-dot" style="color:#ef4444;"></i> ${validLocation}</span>
                            <span class="meta-item"><i class="fa-solid fa-maximize" style="color:var(--accent-gold);"></i> ${validArea} م²</span>
                        </div>
                        ${thumbnailsHtml}
                        <div class="action-row">
                            <a href="${whatsappUrl}" target="_blank" class="btn-action btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> استفسر عبر الواتساب</a>
                            <button type="button" class="btn-action btn-map" onclick="openMapPopup(${propertyLat}, ${propertyLng}, '${validTitle}')"><i class="fa-solid fa-map-location-dot"></i> الموقع</button>
                        </div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        function switchCardMedia(viewerId, src, thumb) {
            const mainImg = document.getElementById(viewerId);
            mainImg.src = src;
            mainImg.setAttribute('onclick', `openLightbox('${src}')`);
            
            const sibs = thumb.parentElement.children;
            for(let s of sibs) s.classList.remove('active');
            thumb.classList.add('active');
        }

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxOverlay').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightboxOverlay').style.display = 'none'; }

        function openMapPopup(lat, lng, title) {
            document.getElementById('popupMapTitle').innerText = "موقع: " + title;
            document.getElementById('mapOverlay').style.display = 'flex';

            // إصلاح الرابط البرمجي لإحداثيات خرائط جوجل للجوال بدون رموز مشوشة لضمان الدقة
            document.getElementById('lnkGoogleMaps').href = `https://www.google.com/maps?q=${lat},${lng}`;

            if (globalPopupMap === null) {
                globalPopupMap = L.map('popupMap', { zoomControl: false });
                L.control.zoom({ position: 'topright' }).addTo(globalPopupMap);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    maxZoom: 20
                }).addTo(globalPopupMap);

                var customIcon = L.divIcon({
                    html: '<div class="pulse-marker"><i class="fa-solid fa-location-dot" style="color: #f59e0b; font-size: 26px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);"></i></div>',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });

                globalPopupMarker = L.marker([lat, lng], { icon: customIcon }).addTo(globalPopupMap);
            } else {
                globalPopupMarker.setLatLng([lat, lng]);
            }

            globalPopupMap.setView([lat, lng], 15);
            setTimeout(() => { globalPopupMap.invalidateSize(); }, 300);
        }

        function closeMapPopup() { document.getElementById('mapOverlay').style.display = 'none'; }
        document.addEventListener('DOMContentLoaded', loadSaudiProperties);
    </script>
</body>
</html>
