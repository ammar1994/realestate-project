<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض العقارات الفاخرة - صالة كبار المستثمرين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1329;
            margin: 0;
            padding: 20px;
            color: #f8fafc;
        }
        h1 {
            text-align: center;
            color: #f59e0b;
            margin-bottom: 5px;
            font-size: 1.8rem;
            font-weight: 900;
        }
        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 25px;
        }
        .properties-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .property-card {
            background: #1c2541;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e3c63;
        }
        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.2);
        }
        .property-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #141d36;
        }
        .property-details {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .property-title {
            font-size: 14px;
            font-weight: bold;
            color: #f8fafc;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .property-price {
            color: #f59e0b;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 12px;
        }
        .property-meta {
            font-size: 11px;
            color: #cbd5e1;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(46, 60, 99, 0.4);
            padding-top: 10px;
        }
        .meta-item { display: flex; align-items: center; gap: 4px; }
        .loading-text {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <h1>صالة العروض الحصرية لكبار المستثمرين</h1>
    <p class="subtitle">مساحة رقمية تفاعلية حية ومحدثة بالكامل من لوحة التحكم مباشرة</p>
    
    <div class="properties-container" id="propertiesWrapper">
        <div class="loading-text">جاري مزامنة وبناء صالة العرض الفاخرة...</div>
    </div>

    <script>
        function loadProperties() {
            const wrapper = document.getElementById('propertiesWrapper');
            wrapper.innerHTML = '';
            
            const currentProperties = localStorage.getItem('global_properties_list');
            const propertiesArray = currentProperties ? JSON.parse(currentProperties) : [];
            
            if (propertiesArray.length === 0) {
                wrapper.innerHTML = '<div class="loading-text"><i class="fa-solid fa-building-circle-exmark" style="font-size:24px; color:#f59e0b; margin-bottom:10px; display:block;"></i> لا توجد عقارات منشورة في الصالة حالياً. أضف عقاراً وارفع صورته من لوحة التحكم لتراه حياً هنا.</div>';
                return;
            }
            
            propertiesArray.forEach(item => {
                const card = document.createElement('div');
                card.className = 'property-card';
                
                card.innerHTML = `
                    <img src="${item.main_img}" class="property-img" onerror="this.src='https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'" alt="${item.title}">
                    <div class="property-details">
                        <div class="property-price">$${Number(item.price).toLocaleString()}</div>
                        <h3 class="property-title">${item.title}</h3>
                        <div class="property-meta">
                            <span class="meta-item"><i class="fa-solid fa-location-dot" style="color:#ef4444;"></i> ${item.location}</span>
                            <span class="meta-item"><i class="fa-solid fa-maximize" style="color:#3b82f6;"></i> ${item.area} م²</span>
                            <span class="meta-item"><i class="fa-solid fa-bed" style="color:#3b82f6;"></i> ${item.rooms}</span>
                        </div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadProperties);
    </script>
</body>
</html>
