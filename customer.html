<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض العروض الحية العقارية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-navy: #0b132b; 
            --amber-accent: #d97706;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }

        header { background: var(--primary-navy); color: #fff; padding: 20px 15px; text-align: center; }
        header h1 { font-size: 1.3rem; font-weight: 800; }

        /* تعديل الهيكل ليكون متجاوباً تماماً ولا يضغط النصوص */
        .main-layout { display: flex; flex-direction: column; gap: 20px; padding: 15px; max-width: 1400px; margin: 0 auto; width: 100%; }
        @media (min-width: 1024px) { .main-layout { display: grid; grid-template-columns: 1fr 400px; } }

        .catalog-container { width: 100%; min-width: 0; }

        #map-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 10px; height: 350px; width: 100%; position: sticky; top: 15px; }
        #map { width: 100%; height: 100%; border-radius: 12px; z-index: 1; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; width: 100%; }
        .prop-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; height: fit-content; }
        
        .card-img-wrapper { position: relative; width: 100%; height: 180px; background: #e2e8f0; }
        .card-img, .card-vid { width: 100%; height: 100%; object-fit: cover; }
        .card-price { position: absolute; bottom: 10px; right: 10px; background: rgba(11, 19, 43, 0.9); color: #fff; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 13px; }
        
        .media-counter-btn { position: absolute; top: 10px; left: 10px; background: rgba(217, 119, 6, 0.9); color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 14px; font-weight: 800; color: var(--primary-navy); margin-bottom: 10px; line-height: 1.4; word-wrap: break-word; }
        
        .card-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-gray); margin-bottom: 12px; background: #f8fafc; padding: 8px; border-radius: 6px; }

        .buttons-wrapper { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        .btn-action { width: 100%; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; border: none; text-decoration: none; }
        .btn-buy { background: var(--amber-accent); color: #fff; }
        .btn-location { background: #f1f5f9; color: var(--primary-navy); border: 1px solid var(--border); }
        .btn-google-maps { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

        .lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 3000; align-items:center; justify-content:center; }
        .lightbox.active { display: flex; }
        .lightbox-content { max-width: 90%; max-height: 80%; display: flex; flex-direction: column; align-items: center; }
        .lightbox-img, .lightbox-video { max-width: 100%; max-height: 60vh; border-radius: 8px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 30px; }
        .lightbox-nav { display: flex; gap: 20px; margin-top: 15px; }
        .btn-nav-box { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 19, 43, 0.6); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 14px; padding: 20px; position: relative; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: #f1f5f9; border: none; width: 28px; height: 28px; border-radius: 50%; }
        .modal-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-layer-group"></i> معرض العروض العقارية الحية</h1>
    </header>

    <div class="main-layout">
        <div class="catalog-container">
            <div class="cards-grid" id="cardsContainer"></div>
        </div>
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div class="lightbox" id="mediaLightbox">
        <button class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
        <div class="lightbox-content">
            <div id="lightboxMediaContainer"></div>
            <div class="lightbox-nav">
                <button class="btn-nav-box" onclick="changeLightboxMedia(-1)">السابق</button>
                <button class="btn-nav-box" onclick="changeLightboxMedia(1)">التالي</button>
            </div>
        </div>
    </div>

    <div class="modal" id="offerModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeOfferModal()"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="modal-title" id="modalTargetTitle">تقديم رغبة تعميد شراء</h3>
            <form id="offerForm" onsubmit="submitBuyerOffer(event)">
                <input type="hidden" id="modalPropId">
                <input type="hidden" id="modalPropTitle">
                <div class="form-group">
                    <label>اسم المستثمر</label>
                    <input type="text" id="bName" class="form-control" placeholder="اكتب اسمك الكريم" required>
                </div>
                <div class="form-group">
                    <label>العرض المالي المقترح (رس)</label>
                    <input type="number" id="bPrice" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>رقم جوال التواصل</label>
                    <input type="text" id="bPhone" class="form-control" placeholder="9665xxxxxxxx" required>
                </div>
                <button type="submit" class="btn-action btn-buy"><i class="fa-solid fa-paper-plane"></i> إرسال السوم الحقيقي </button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markersGroup;
        let currentPropMedia = [];
        let currentMediaIndex = 0;
        let propertyMarkersMap = {};

        const defaultSaudiProperties = [
            {
                id: 'saudi_1',
                title: 'فيلا فخمة مودرن بتصميم نجدى معاصر ومسبح',
                price: '6200000',
                location: 'الرياض',
                area: '420',
                phone: '966500000000',
                lat: '24.7950',
                lng: '46.6190',
                media_list: [{type: 'image', data: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600&q=80'}]
            }
        ];

        function getVault() {
            try {
                return JSON.parse(localStorage.getItem('saudi_property_vault') || JSON.stringify(defaultSaudiProperties));
            } catch(e) {
                return defaultSaudiProperties;
            }
        }

        function initMap() {
            try {
                map = L.map('map').setView([24.7136, 46.6753], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            } catch(e) { console.error(e); }
        }

        function renderCatalog() {
            const container = document.getElementById('cardsContainer');
            if(!container) return;
            container.innerHTML = '';
            
            if(markersGroup) markersGroup.clearLayers();
            propertyMarkersMap = {};

            const properties = getVault();

            properties.forEach(item => {
                const card = document.createElement('div');
                card.className = 'prop-card';
                
                const hasMedia = item.media_list && item.media_list.length > 0;
                const firstMedia = hasMedia ? item.media_list[0] : {type: 'image', data: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80'};
                const mediaHtml = firstMedia.type === 'video' ? `<video src="${firstMedia.data}" class="card-vid" muted autoplay loop></video>` : `<img src="${firstMedia.data}" class="card-img">`;

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        ${mediaHtml}
                        <span class="card-price">${Number(item.price).toLocaleString()} رس</span>
                        <button class="media-counter-btn" onclick="openMediaLightbox('${item.id}')"><i class="fa-solid fa-images"></i> الوسائط (${item.media_list ? item.media_list.length : 1})</button>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${escapeHtml(item.title)}</h3>
                        <div class="card-meta">
                            <span><i class="fa-solid fa-location-dot"></i> ${escapeHtml(item.location)}</span>
                            <span><i class="fa-solid fa-ruler"></i> ${Number(item.area).toLocaleString()} م²</span>
                        </div>
                        <div class="buttons-wrapper">
                            <button class="btn-action btn-buy" onclick="openOfferModal('${item.id}', '${escapeHtml(item.title)}')"><i class="fa-solid fa-gavel"></i> تقديم رغبة لشراء </button>
                            <button class="btn-action btn-location" onclick="focusPropertyOnMap('${item.id}')"><i class="fa-solid fa-map"></i> تحديد الموقع على الخريطة </button>
                            <a class="btn-action btn-google-maps" href="https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lng}" target="_blank">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> توجيه عبر خرائط Google
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                if(item.lat && item.lng && markersGroup) {
                    const marker = L.marker([parseFloat(item.lat), parseFloat(item.lng)])
                        .bindPopup(`<div style="font-family:'Cairo'; text-align:right; font-weight:700;">${escapeHtml(item.title)}</div>`);
                    markersGroup.addLayer(marker);
                    propertyMarkersMap[item.id] = marker;
                }
            });
        }

        function focusPropertyOnMap(id) {
            const marker = propertyMarkersMap[id];
            if(marker && map) {
                const latlng = marker.getLatLng();
                map.setView(latlng, 13);
                marker.openPopup();
                document.getElementById('map-container').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('الموقع متاح عبر زر خرائط Google الخارجي.');
            }
        }

        function openMediaLightbox(id) {
            const properties = getVault();
            const target = properties.find(p => p.id === id);
            if(!target || !target.media_list) return;
            currentPropMedia = target.media_list; currentMediaIndex = 0;
            showLightboxMedia();
            document.getElementById('mediaLightbox').classList.add('active');
        }

        function showLightboxMedia() {
            const container = document.getElementById('lightboxMediaContainer'); container.innerHTML = '';
            const current = currentPropMedia[currentMediaIndex];
            if(!current) return;
            container.innerHTML = current.type === 'video' ? `<video src="${current.data}" class="lightbox-video" controls autoplay></video>` : `<img src="${current.data}" class="lightbox-img">`;
        }

        function changeLightboxMedia(dir) {
            currentMediaIndex += dir;
            if(currentMediaIndex >= currentPropMedia.length) currentMediaIndex = 0;
            if(currentMediaIndex < 0) currentMediaIndex = currentPropMedia.length - 1;
            showLightboxMedia();
        }

        function closeLightbox() { document.getElementById('mediaLightbox').classList.remove('active'); }
        function openOfferModal(id, title) {
            document.getElementById('modalPropId').value = id;
            document.getElementById('modalPropTitle').value = title;
            document.getElementById('modalTargetTitle').innerText = `تقديم طلب شراء عقار: ${title}`;
            document.getElementById('offerModal').classList.add('active');
        }
        function closeOfferModal() { document.getElementById('offerModal').classList.remove('active'); }

        function submitBuyerOffer(e) {
            e.preventDefault();
            const offers = JSON.parse(localStorage.getItem('saudi_property_offers') || '[]');
            offers.unshift({
                id: 'offer_' + Date.now(),
                propId: document.getElementById('modalPropId').value,
                propTitle: document.getElementById('modalPropTitle').value,
                buyerName: document.getElementById('bName').value,
                buyerPrice: document.getElementById('bPrice').value,
                buyerPhone: document.getElementById('bPhone').value
            });
            localStorage.setItem('saudi_property_offers', JSON.stringify(offers));
            alert('تم تسجيل سومك المالي الحقيقي بنجاح.');
            closeOfferModal();
        }

        function escapeHtml(text) { return String(text).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

        document.addEventListener('DOMContentLoaded', () => { initMap(); renderCatalog(); window.addEventListener('focus', renderCatalog); });
    </script>
</body>
</html>
