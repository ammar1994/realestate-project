<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة وتحديث العقارات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 16px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 16px; font-weight: bold; color: #f59e0b; margin: 0; }
        .content { padding: 20px 14px; }
        .form-container { background: #1c2541; border-radius: 12px; padding: 20px; border: 1px solid #2e3c63; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 16px; text-align: right; }
        label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; background: #0b1329; border: 1px solid #2e3c63; border-radius: 6px; color: white; box-sizing: border-box; font-size: 13px; }
        input:focus, select:focus, textarea:focus { border-color: #f59e0b; outline: none; }
        textarea { height: 80px; }
        #map { width: 100%; height: 180px; border-radius: 6px; margin-top: 5px; border: 1px solid #3a4b7c; }
        
        .file-zone { border: 2px dashed #f59e0b; padding: 20px; border-radius: 8px; text-align: center; background: #0b1329; cursor: pointer; }
        .file-zone p { margin: 0; font-size: 12px; color: #94a3b8; }
        .preview-wrapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
        .preview-box { width: 100%; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #f59e0b; background: #141d36; }
        
        .submit-btn { width: 100%; padding: 14px; background: #f59e0b; border: none; border-radius: 6px; color: #0b1329; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .submit-btn:hover { background: #d97706; }
        .msg { text-align: center; margin-top: 15px; font-size: 13px; font-weight: bold; padding: 10px; border-radius: 6px; display: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">بوابة رفع وتحديث الأصول العقارية الحية</div>
    </nav>

    <div class="content">
        <div class="form-container">
            <h2 id="pageTitle" style="font-size: 16px; color:#f8fafc; text-align:center; margin-top:0; margin-bottom: 20px;">إضافة عقار جديد</h2>
            <form id="propertyForm">
                <input type="hidden" id="propertyId">
                
                <div class="form-group">
                    <label>عنوان العقار:</label>
                    <input type="text" id="title" placeholder="مثال: فيلا ملكية مودرن" required>
                </div>

                <div class="form-group">
                    <label>السعر المطلوب (ر.س):</label>
                    <input type="number" id="price" required>
                </div>

                <div class="form-group">
                    <label>الموقع / المدينة والحي:</label>
                    <input type="text" id="location" placeholder="مثال: الرياض - الملقا" required>
                </div>

                <div class="form-group">
                    <label>المساحة الإجمالية (متر مربع):</label>
                    <input type="number" id="area" required>
                </div>

                <div class="form-group">
                    <label>عدد الغرف والتفاصيل الداخلية:</label>
                    <input type="text" id="rooms" placeholder="مثال: 5 غرف - 4 حمامات" required>
                </div>

                <div class="form-group">
                    <label>رقم تواصل الواتساب (مثال: 9665xxxxxxxx):</label>
                    <input type="text" id="phone" placeholder="966500000000" required>
                </div>

                <div class="form-group">
                    <label>وصف وتفاصيل إضافية:</label>
                    <textarea id="description" placeholder="اكتب ميزات العقار والتشطيب هنا..."></textarea>
                </div>

                <div class="form-group">
                    <label>خريطة موقع العقار الافتراضية:</label>
                    <div id="map"></div>
                    <input type="hidden" id="lat" value="24.7136">
                    <input type="hidden" id="lng" value="46.6753">
                </div>

                <div class="form-group">
                    <label>استوديو الوسائط (يتم ضغط حجم الصور فوراً لمنع تعليق السيرفر):</label>
                    <div class="file-zone" onclick="document.getElementById('mediaInput').click()">
                        <p id="uploadStatus">📸 اضغط هنا لاختيار الصور من استوديو جوالك</p>
                        <input type="file" id="mediaInput" accept="image/*" multiple style="display: none;">
                    </div>
                    <div class="preview-wrapper" id="previewContainer"></div>
                </div>

                <button type="submit" class="submit-btn" id="btnSubmit">حفظ العقار ونشره سحابياً</button>
            </form>
            <div class="msg" id="responseMsg"></div>
            <a href="dashboard.html" class="back-link">العودة للوحة التحكم</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20";

        var map = L.map('map').setView([24.7136, 46.6753], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var marker = L.marker([24.7136, 46.6753], {draggable: true}).addTo(map);

        marker.on('dragend', function() {
            var pos = marker.getLatLng();
            document.getElementById('lat').value = pos.lat;
            document.getElementById('lng').value = pos.lng;
        });

        let processedImages = [];

        document.getElementById('mediaInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            const container = document.getElementById('previewContainer');
            document.getElementById('uploadStatus').innerText = "⚡ جاري معالجة وتصغير حجم الصور...";

            files.forEach(file => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // تحديد سقف العرض لـ 500 بكسل فقط لتقليص الوزن النصي بشكل جذري وتخطي حظر الـ VPN
                        const max_width = 500; 
                        let width = img.width;
                        let height = img.height;

                        if (width > max_width) {
                            height *= max_width / width;
                            width = max_width;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // ضغط فائق الجودة والحجم بنسبة 50% لضمان قبول السيرفر فوراً لـ Base64
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                        processedImages.push({ type: 'image', data: compressedBase64 });
                        
                        const element = document.createElement('img');
                        element.src = compressedBase64;
                        element.className = 'preview-box';
                        container.appendChild(element);
                    }
                };
            });
            setTimeout(() => { document.getElementById('uploadStatus').innerText = "✨ تم التجهيز الآمن للرفع!"; }, 1500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit_id');
            if (editId) {
                document.getElementById('pageTitle').innerText = "تحديث بيانات العقار المدرج";
                document.getElementById('btnSubmit').innerText = "تثبيت التحديثات الحالية";
                document.getElementById('propertyId').value = editId;
                
                const editData = JSON.parse(localStorage.getItem('edit_property_data'));
                if (editData && editData.id == editId) {
                    document.getElementById('title').value = editData.title || "";
                    document.getElementById('price').value = editData.price || "";
                    document.getElementById('location').value = editData.location || "";
                    document.getElementById('area').value = editData.area || "";
                    document.getElementById('rooms').value = editData.rooms || "";
                    document.getElementById('phone').value = editData.phone || "";
                    document.getElementById('description').value = editData.description || "";
                    if (editData.media_list) {
                        processedImages = editData.media_list;
                        const container = document.getElementById('previewContainer');
                        processedImages.forEach(f => {
                            let dom = document.createElement('img');
                            dom.src = f.data;
                            dom.className = 'preview-box';
                            container.appendChild(dom);
                        });
                    }
                }
            }
        });

        document.getElementById('propertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('responseMsg');
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "rgba(245, 158, 11, 0.2)";
            msgDiv.style.color = "#f59e0b";
            msgDiv.innerText = "جاري تفتيت البيانات وتمريرها عبر جدار السيرفر المباشر...";

            const id = document.getElementById('propertyId').value;
            
            // نرسل أولاً البيانات الخفيفة لضمان استجابة السيرفر وتجاوز حماية حجم الطلب
            const payload = {
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                area: parseInt(document.getElementById('area').value),
                rooms: document.getElementById('rooms').value,
                phone: document.getElementById('phone').value,
                description: document.getElementById('description').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                media_list: processedImages // تمرير المصفوفة المضغوطة فائقة الخفة بنجاح
            };

            let url = `${SUPABASE_URL}/rest/v1/properties`;
            let method = 'POST';

            if (id) {
                url = `${SUPABASE_URL}/rest/v1/properties?id=eq.${id}`;
                method = 'PATCH';
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Failed to save text data');

                msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.2)";
                msgDiv.style.color = "#10b981";
                msgDiv.innerText = "🎉 تم الحفظ والمزامنة السحابية بنجاح تام!";
                localStorage.removeItem('edit_property_data');
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);

            } catch (error) {
                console.error(error);
                msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                msgDiv.style.color = "#ef4444";
                msgDiv.innerText = "❌ السيرفر رفض استقبال حزم الصور الطويلة، تأكد من اختيار صورة أو اثنتين بحد أقصى أو تقليص عددها تجنباً لقيود VPN.";
            }
        });
    </script>
</body>
</html>
