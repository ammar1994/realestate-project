<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عقار جديد</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .form-container {
            background: #fff;
            max-width: 600px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #27ae60;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>إضافة عقار جديد إلى السيرفر</h2>
        <form id="addPropertyForm">
            <div class="form-group">
                <label>عنوان العقار:</label>
                <input type="text" id="title" required placeholder="مثال: فيلا مودرن للبيع">
            </div>
            <div class="form-group">
                <label>السعر (ل.س):</label>
                <input type="number" id="price" required placeholder="مثال: 50000000">
            </div>
            <div class="form-group">
                <label>الموقع / المدينة:</label>
                <input type="text" id="location" required placeholder="مثال: دمشق - المزة">
            </div>
            <div class="form-group">
                <label>المساحة (متر مربع):</label>
                <input type="text" id="area" required placeholder="مثال: 150">
            </div>
            <div class="form-group">
                <label>عدد الغرف والتفاصيل:</label>
                <input type="text" id="rooms" required placeholder="مثال: 3 غرف وصالون">
            </div>
            <div class="form-group">
                <label>رابط الصورة الرئيسية للعقار:</label>
                <input type="text" id="main_img" required placeholder="ضع رابط الصورة أو اسم الملف مثل villa.jpg">
            </div>
            <input type="hidden" id="lat" value="33.5138">
            <input type="hidden" id="lng" value="36.2765">
            <input type="hidden" id="gallery" value="[]">

            <button type="submit" id="submitBtn">حفظ العقار ونشره فوراً</button>
        </form>
        <div class="message" id="msgBox"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20";

        document.getElementById('addPropertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('msgBox');
            
            btn.disabled = true;
            btn.innerText = "جاري الحفظ بالسيرفر السحابي...";
            msgBox.innerText = "";

            // تجميع البيانات من الحقول لرفعها للجدول
            const propertyData = {
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                area: document.getElementById('area').value,
                rooms: document.getElementById('rooms').value,
                main_img: document.getElementById('main_img').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                gallery: document.getElementById('gallery').value
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(propertyData)
                });

                if (!response.ok) throw new Error('فشلت عملية الإضافة');

                msgBox.style.color = "#2ecc71";
                msgBox.innerText = "🎉 تم حفظ العقار بنجاح في قاعدة البيانات السحابية!";
                document.getElementById('addPropertyForm').reset();

            } catch (error) {
                console.error(error);
                msgBox.style.color = "#e74c3c";
                msgBox.innerText = "❌ حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.";
            } finally {
                btn.disabled = false;
                btn.innerText = "حفظ العقار ونشره فوراً";
            }
        });
    </script>
</body>
</html>
