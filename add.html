<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة وتعديل العقارات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .content { padding: 20px 14px; }
        .form-container { background: #1c2541; border-radius: 12px; padding: 20px; border: 1px solid #2e3c63; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 11px; background: #0b1329; border: 1px solid #2e3c63; border-radius: 6px; color: white; box-sizing: border-box; font-size: 13px; }
        input:focus, select:focus, textarea:focus { border-color: #f59e0b; outline: none; }
        textarea { height: 75px; resize: vertical; }
        #map { width: 100%; height: 200px; border-radius: 6px; margin-top: 5px; border: 1px solid #3a4b7c; }
        .geo-btn { background: #3b82f6; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-bottom: 5px; }
        
        /* تنسيقات حقل رفع الملفات المضغوط */
        .file-zone { border: 2px dashed #3a4b7c; padding: 15px; border-radius: 6px; text-align: center; background: #0b1329; cursor: pointer; }
        .file-zone p { margin: 0; font-size: 11px; color: #94a3b8; }
        .preview-wrapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 5px; margin-top: 10px; }
        .preview-box { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid #f59e0b; background: #141d36; }
        
        .submit-btn { width: 100%; padding: 12px; background: #f59e0b; border: none; border-radius: 6px; color: #0b1329; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .msg { text-align: center; margin-top: 10px; font-size: 12px; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #94a3b8; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">لوحة إضافة وتحديث البيانات العقارية</div>
    </nav>

    <div class="content">
        <div class="form-container">
            <h2 id="pageTitle" style="font-size: 15px; color:#f59e0b; text-align:center; margin-top:0;">إضافة عقار جديد</h2>
            <form id="propertyForm">
                <input type="hidden" id="propertyId">
                
                <div class="form-group">
                    <label>تصنيف ونوع العقار:</label>
                    <select id="propertyType">
                        <option value="شقة">شقة</option>
                        <option value="فيلا">فيلا</option>
                        <option value="قصر">قصر</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>عنوان العرض:</label>
                    <input type="text" id="title" placeholder="مثال: فيلا سكنية مستقلة" required>
                </div>

                <div class="form-group">
                    <label>السعر المطلوب (ر.س):</label>
                    <input type="number" id="price" required>
                </div>

                <div class="form-group">
                    <label>المدينة والحي:</label>
                    <input type="text" id="location" required>
                </div>

                <div class="form-group">
                    <label>موقع العقار على الخريطة:</label>
                    <button type="button" class="geo-btn" onclick="locateUser()">تحديد موقعي الحالي تلقائياً</button>
                    <div id="map"></div>
                    <input type="hidden" id="lat" value="24.7136">
                    <input type="hidden" id="lng" value="46.6753">
                </div>

                <div class="form-group">
                    <label>رقم تواصل الواتساب للمسؤول (بدون أصفار أو علامة + مثال 9665xxxxxxxx):</label>
                    <input type="text" id="phone" required>
                </div>

                <div class="form-group">
                    <label>المساحة (متر مربع):</label>
                    <input type="number" id="area" required>
                </div>

                <div class="form-group">
                    <label>عدد الغرف والتفاصيل الداخلية:</label>
                    <input type="text" id="rooms" placeholder="مثال: 5 غرف ومطبخ" required>
                </div>

                <div class="form-group">
                    <label>وصف العقار ومواصفاته:</label>
                    <textarea id="description" placeholder="اكتب ميزات العقار والتجهيزات هنا..."></textarea>
                </div>

                <div class="form-group">
                    <label>استوديو الوسائط (صور أو فيديو متعدد - يتم ضغط الصور تلقائياً لحماية سرعة الموقع):</label>
                    <div class="file-zone" onclick="document.getElementById('mediaInput').click()">
                        <p id="uploadStatus">اضغط لاختيار الصور والفيديوهات من الاستوديو</p>
                        <input type="file" id="mediaInput" accept="image/*,video/*" multiple style="display: none;">
                    </div>
                    <div class="preview-wrapper" id="previewContainer"></div>
                </div>

                <button type="submit" class="submit-btn" id="btnSubmit">حفظ وتثبيت البيانات</button>
            </form>
            <div class="msg" id="responseMsg"></div>
            <a href="dashboard.html" class="back-link">العودة للوحة التحكم</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20";

        var map = L.map('map').setView([24.7136, 46.6753], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var marker = L.marker([24.7136, 46.6753], {draggable: true}).addTo(map);

        marker.on('dragend', function() {
            var pos = marker.getLatLng();
            document.getElementById('lat').value = pos.lat;
            document.getElementById('lng').value = pos.lng;
        });

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    map.setView([p.coords.latitude, p.coords.longitude], 14);
                    marker.setLatLng([p.coords.latitude, p.coords.longitude]);
                    document.getElementById('lat').value = p.coords.latitude;
                    document.getElementById('lng').value = p.coords.longitude;
                });
            }
        }

        // مصفوفة حفظ الوسائط المضغوطة المعالجة محلياً
        let compressedMediaFiles = [];

        document.getElementById('mediaInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            const container = document.getElementById('previewContainer');
            document.getElementById('uploadStatus').innerText = "جاري معالجة وضغط الملفات لضمان السرعة...";

            files.forEach(file => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    if (file.type.startsWith('image/')) {
                        // محرك ضغط الصور باستخدام Canvas وتخفيض الجودة لتجاوز ثقل الرفع والـ VPN
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const max_width = 700;
                            let width = img.width;
                            let height = img.height;

                            if (width > max_width) {
                                height *= max_width / width;
                                width = max_width;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // ضغط الصورة إلى صيغة jpeg بجودة 60% فقط
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                            compressedMediaFiles.push({ type: 'image', data: compressedBase64 });
                            
                            const element = document.createElement('img');
                            element.src = compressedBase64;
                            element.className = 'preview-box';
                            container.appendChild(element);
                        }
                    } else if (file.type.startsWith('video/')) {
                        // حفظ الفيديو كصيغة Base64 مباشرة
                        compressedMediaFiles.push({ type: 'video', data: event.target.result });
                        const element = document.createElement('video');
                        element.src = event.target.result;
                        element.className = 'preview-box';
                        container.appendChild(element);
                    }
                };
            });
            setTimeout(() => { document.getElementById('uploadStatus').innerText = "✨ تم معالجة وإضافة الوسائط للاستوديو"; }, 1500);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit_id');
            
            if (editId) {
                document.getElementById('pageTitle').innerText = "تعديل بيانات العقار الحالي";
                document.getElementById('btnSubmit').innerText = "حفظ التعديلات";
                document.getElementById('propertyId').value = editId;
                
                const editData = JSON.parse(localStorage.getItem('edit_property_data'));
                if (editData && editData.id == editId) {
                    document.getElementById('propertyType').value = editData.property_type || "شقة";
                    document.getElementById('title').value = editData.title || "";
                    document.getElementById('price').value = editData.price || "";
                    document.getElementById('location').value = editData.location || "";
                    document.getElementById('phone').value = editData.phone || "";
                    document.getElementById('area').value = editData.area || "";
                    document.getElementById('rooms').value = editData.rooms || "";
                    document.getElementById('description').value = editData.description || "";
                    
                    if (editData.media_list) {
                        compressedMediaFiles = editData.media_list;
                        const container = document.getElementById('previewContainer');
                        compressedMediaFiles.forEach(f => {
                            let dom = document.createElement(f.type === 'video' ? 'video' : 'img');
                            dom.src = f.data;
                            dom.className = 'preview-box';
                            container.appendChild(dom);
                        });
                    }
                    
                    if (editData.lat && editData.lng) {
                        document.getElementById('lat').value = editData.lat;
                        document.getElementById('lng').value = editData.lng;
                        map.setView([editData.lat, editData.lng], 14);
                        marker.setLatLng([editData.lat, editData.lng]);
                    }
                }
            }
        });

        document.getElementById('propertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('responseMsg');
            msgDiv.style.color = "yellow";
            msgDiv.innerText = "جاري الاتصال بالسيرفر وحفظ البيانات...";

            const id = document.getElementById('propertyId').value;
            const payload = {
                property_type: document.getElementById('propertyType').value,
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                phone: document.getElementById('phone').value,
                area: parseInt(document.getElementById('area').value),
                rooms: document.getElementById('rooms').value,
                description: document.getElementById('description').value,
                media_list: compressedMediaFiles // رفع مصفوفة الملفات النصية المضغوطة مباشرة
            };

            let url = `${SUPABASE_URL}/rest/v1/properties`;
            let method = 'POST';

            if (id) {
                url = `${SUPABASE_URL}/rest/v1/properties?id=eq.${id}`;
                method = 'PATCH';
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('فشل الحفظ');

                msgDiv.style.color = "green";
                msgDiv.innerText = "تم حفظ التغييرات بنجاح!";
                localStorage.removeItem('edit_property_data');
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);

            } catch (error) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "حدث خطأ أثناء الاتصال بالخادم. حاول مجدداً.";
            }
        });
    </script>
</body>
</html>
