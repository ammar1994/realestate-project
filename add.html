<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة بيانات العقار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            background: #fff;
            max-width: 500px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background-color: #27ae60;
        }
        .msg {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 id="pageTitle">إضافة عقار جديد</h2>
        <form id="propertyForm">
            <input type="hidden" id="propertyId">
            
            <div class="form-group">
                <label>نوع العقار:</label>
                <select id="propertyType">
                    <option value="شقة">شقة</option>
                    <option value="فيلا">فيلا</option>
                    <option value="قصر">قصر</option>
                </select>
            </div>

            <div class="form-group">
                <label>عنوان وعرض العقار:</label>
                <input type="text" id="title" required placeholder="مثال: فيلا مخدمة بالكامل">
            </div>

            <div class="form-group">
                <label>السعر (ل.س):</label>
                <input type="number" id="price" required>
            </div>

            <div class="form-group">
                <label>الموقع / المدينة:</label>
                <input type="text" id="location" required>
            </div>

            <div class="form-group">
                <label>المساحة (متر مربع):</label>
                <input type="number" id="area" required>
            </div>

            <div class="form-group">
                <label>عدد الغرف والتفاصيل:</label>
                <input type="text" id="rooms" required placeholder="مثال: 4 غرف وصالة">
            </div>

            <div class="form-group">
                <label>وصف تفصيلي للعقار:</label>
                <textarea id="description" placeholder="اكتب مواصفات العقار، الميزات، حالة الإكساء..."></textarea>
            </div>

            <div class="form-group">
                <label>رابط الصورة الرئيسية للعقار:</label>
                <input type="text" id="mainImg">
            </div>

            <button type="submit" class="submit-btn" id="btnSubmit">حفظ العقار ونشره فوراً</button>
        </form>
        
        <div class="msg" id="responseMsg"></div>
        <a href="dashboard.html" class="back-btn">العودة إلى لوحة التحكم</a>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20"; 

        // التحقق من وجود عملية تعديل (ملء الحقول بالمعلومات المرسلة)
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit_id');
            
            if (editId) {
                document.getElementById('pageTitle').innerText = "تعديل بيانات العقار";
                document.getElementById('btnSubmit').innerText = "حفظ التعديلات الحالية";
                document.getElementById('propertyId').value = editId;
                
                // استرجاع البيانات الممررة عبر الذاكرة المؤقتة لضمان الاستقرار والسرعة
                const editData = JSON.parse(localStorage.getItem('edit_property_data'));
                if (editData && editData.id == editId) {
                    document.getElementById('propertyType').value = editData.property_type || "شقة";
                    document.getElementById('title').value = editData.title || "";
                    document.getElementById('price').value = editData.price || "";
                    document.getElementById('location').value = editData.location || "";
                    document.getElementById('area').value = editData.area || "";
                    document.getElementById('rooms').value = editData.rooms || "";
                    document.getElementById('description').value = editData.description || "";
                    document.getElementById('mainImg').value = editData.main_img || "";
                }
            }
        });

        document.getElementById('propertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('responseMsg');
            msgDiv.style.color = "blue";
            msgDiv.innerText = "جاري الحفظ والاتصال بالسيرفر...";

            const id = document.getElementById('propertyId').value;
            const property_type = document.getElementById('propertyType').value;
            const title = document.getElementById('title').value;
            const price = parseFloat(document.getElementById('price').value);
            const location = document.getElementById('location').value;
            const area = parseInt(document.getElementById('area').value);
            const rooms = document.getElementById('rooms').value;
            const description = document.getElementById('description').value;
            const main_img = document.getElementById('mainImg').value;

            const payload = { property_type, title, price, location, area, rooms, description, main_img };
            
            let url = `${SUPABASE_URL}/rest/v1/properties`;
            let method = 'POST';
            
            // إذا كان هناك معرف، نقوم بعملية تحديث (Update) بدلاً من إضافة جديدة
            if (id) {
                url = `${SUPABASE_URL}/rest/v1/properties?id=eq.${id}`;
                method = 'PATCH';
            }

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('فشلت عملية الحفظ بالسيرفر');

                msgDiv.style.color = "green";
                msgDiv.innerText = "تم حفظ العقار وتحديث البيانات بنجاح!";
                
                // تنظيف ذاكرة التعديل المؤقتة بعد النجاح
                localStorage.removeItem('edit_property_data');
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            </codeblock>
            } catch (error) {
                console.error(error);
                msgDiv.style.color = "red";
                msgDiv.innerText = "حدث خطأ أثناء الحفظ، يرجى المحاولة مجدداً.";
            }
        });
    </script>
</body>
</html>
