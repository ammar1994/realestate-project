<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة عقار جديد - المحفظة الفاخرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-main: #0b1329;
            --bg-card: #1c2541;
            --border-color: #2e3c63;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
        }

        nav { 
            background: var(--bg-card); 
            padding: 16px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center; 
        }

        .logo { 
            font-size: 16px; 
            font-weight: 800; 
            margin: 0; 
            color: var(--text-primary); 
            letter-spacing: 0.5px;
        }
        .logo span { 
            color: var(--accent-gold); 
            font-weight: 900; 
            margin-right: 4px; 
        }

        .content { 
            padding: 24px 14px; 
        }
        
        .form-container { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 24px; 
            border: 1px solid var(--border-color); 
            max-width: 580px; 
            margin: 0 auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-group { 
            margin-bottom: 18px; 
            text-align: right; 
        }

        label { 
            display: block; 
            font-size: 12px; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            font-weight: 700; 
        }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            background: var(--bg-main); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 14px; 
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--accent-gold); 
            outline: none; 
        }
        
        /* تصميم الخريطة الاحترافي الداكن المدمج الشبيه بـ MapBox */
        .map-wrapper {
            position: relative;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        #map { 
            width: 100%; 
            height: 280px; 
            z-index: 1; 
            background: #141926;
        }

        .geo-btn { 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            padding: 10px 14px; 
            border-radius: 6px; 
            font-size: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-bottom: 8px; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            transition: background 0.2s;
        }
        .geo-btn:hover {
            background: #2563eb;
        }
        
        .file-dropzone { 
            border: 2px dashed #3a4b7c; 
            padding: 24px; 
            border-radius: 10px; 
            text-align: center; 
            background: var(--bg-main); 
            cursor: pointer; 
            transition: border-color 0.2s;
        }
        .file-dropzone:hover {
            border-color: var(--accent-gold);
        }
        .file-dropzone i { 
            font-size: 28px; 
            color: var(--accent-gold); 
            margin-bottom: 8px; 
        }
        .file-dropzone p { 
            margin: 0; 
            font-size: 12px; 
            color: var(--text-secondary); 
        }
        
        .gallery-preview { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
            gap: 10px; 
            margin-top: 12px; 
        }
        .preview-item { 
            width: 100%; 
            height: 85px; 
            object-fit: cover; 
            border-radius: 6px; 
            border: 1px solid var(--accent-gold); 
            background: #141d36; 
            image-orientation: from-image;
        }
        
        .submit-btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-gold); 
            border: none; 
            border-radius: 8px; 
            color: var(--bg-main); 
            font-size: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: opacity 0.2s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .success-msg { 
            display: none; 
            color: var(--accent-green); 
            font-size: 13px; 
            font-weight: bold; 
            margin-top: 15px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-layer-group"></i> غطاء وإدارة المحتوى العقاري <span>PREMIUM</span></div>
    </nav>

    <div class="content">
        <div class="form-container">
            <h2 style="font-size: 17px; color:var(--accent-gold); text-align:center; margin-top:0; margin-bottom:20px;">تغذية صالة عروض الأصول الاستثمارية</h2>
            <form id="saudi-property-form">
                
                <div class="form-group">
                    <label>عنوان العرض الاستثماري (مثال: فيلا مودرن فاخرة بحي الملقا):</label>
                    <input type="text" id="title" placeholder="أدخل عنواناً جذاباً واحترافياً" required>
                </div>

                <div class="form-group">
                    <label>القيمة المالية المستهدفة (بالريال السعودي ر.س):</label>
                    <input type="number" id="price" placeholder="مثال: 3800000" required>
                </div>

                <div class="form-group">
                    <label>المنطقة والحي الجغرافي (مثال: الرياض - حطين):</label>
                    <input type="text" id="location" placeholder="حدد المدينة والحي السكني" required>
                </div>

                <div class="form-group">
                    <label>تحديد الإحداثيات الجغرافية التفاعلية للأصل:</label>
                    <button type="button" class="geo-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i> رصد موقعي الحالي تلقائياً</button>
                    <span style="font-size:11px; color:var(--text-secondary); display:block; margin-bottom:5px;">انقر على أي نقطة بالخريطة لتعديل وتثبيت إحداثيات العقار بدقة:</span>
                    
                    <div class="map-wrapper">
                        <div id="map"></div>
                    </div>
                    
                    <input type="hidden" id="lat" name="lat" value="24.7136">
                    <input type="hidden" id="lng" name="lng" value="46.6753">
                </div>

                <div class="form-group">
                    <label>قناة تواصل الواتساب الرسمية (صيغة دولية كاملة مثال: 966500000000):</label>
                    <input type="text" id="phone" placeholder="9665xxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label>المساحة الهندسية الإجمالية (م²):</label>
                    <input type="number" id="area" placeholder="مثال: 420" required>
                </div>

                <div class="form-group">
                    <label>توزيع الفراغات المعمارية والتفاصيل الداخلية:</label>
                    <input type="text" id="details" placeholder="مثال: 6 أجنحة - 5 دورات مياه - ملحق خارجي" required>
                </div>
                
                <div class="form-group">
                    <label>المحفظة المرئية للعقار (ألبوم الميديا عالي الجودة):</label>
                    <div class="file-dropzone" onclick="document.getElementById('mediaFiles').click()">
                        <i class="fa-solid fa-folder-plus"></i>
                        <p id="upload-status">اضغط لإدراج حتى 5 صور أو مأثورات مرئية من الجهاز</p>
                        <input type="file" id="mediaFiles" accept="image/*,video/*" multiple style="display: none;">
                    </div>
                    <div class="gallery-preview" id="mediaPreviewWrapper"></div>
                </div>

                <button type="submit" class="submit-btn">تأكيد الأرشفة ونشر العرض الحي</button>
                <div class="success-msg" id="success-box"><i class="fa-solid fa-circle-check"></i> تم تأمين وحفظ البيانات وبثها في صالة العرض الاستثمارية! جاري التحويل...</div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة في نطاق المملكة
        var map = L.map('map', { zoomControl: false }).setView([24.7136, 46.6753], 11);
        L.control.zoom({ position: 'topright' }).addTo(map);
        
        // 🌟 دمج ستايل التبليط الداكن الخرافي الفاخر البديل لخرائط ماب بوكس بدون فيزا
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        // تخصيص الأيقونة برمجياً لتطابق ألوان كرت العقار
        var goldIcon = L.divIcon({
            html: '<i class="fa-solid fa-location-pin" style="color: #f59e0b; font-size: 32px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);"></i>',
            iconSize: [30, 42],
            iconAnchor: [15, 35],
            className: 'custom-marker-icon'
        });

        var marker = L.marker([24.7136, 46.6753], {draggable: true, icon: goldIcon}).addTo(map);

        marker.on('dragend', function(e) {
            var position = marker.getLatLng();
            document.getElementById('lat').value = position.lat;
            document.getElementById('lng').value = position.lng;
        });

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });

        function locateMe() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    document.getElementById('lat').value = lat;
                    document.getElementById('lng').value = lng;
                    map.setView([lat, lng], 15);
                    marker.setLatLng([lat, lng]);
                }, function() {
                    alert("نظام تحديد المواقع GPS معطل بالجهاز الحالي، يرجى تعيين الدبوس يدوياً.");
                });
            } else {
                alert("المتصفح لا يدعم رصد الإحداثيات تلقائياً.");
            }
        }

        let loadedMediaArray = [];
        document.getElementById('mediaFiles').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            const previewWrapper = document.getElementById('mediaPreviewWrapper');
            
            if((loadedMediaArray.length + files.length) > 5) {
                alert("الحد الأقصى المسموح برصده هو 5 ملفات وسائط فقط.");
                return;
            }

            document.getElementById('upload-status').innerText = "جاري تجميع وتهيئة الميديا برمجياً...";

            files.forEach(file => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    if (file.type.startsWith('image/')) {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 700;
                            let width = img.width;
                            let height = img.height;

                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.65);
                            loadedMediaArray.push({ type: 'image', data: compressedBase64 });
                            
                            const imgDom = document.createElement('img');
                            imgDom.src = compressedBase64;
                            imgDom.className = 'preview-item';
                            previewWrapper.appendChild(imgDom);
                        }
                    } else if (file.type.startsWith('video/')) {
                        loadedMediaArray.push({ type: 'video', data: event.target.result });
                        const videoDom = document.createElement('video');
                        videoDom.src = event.target.result;
                        videoDom.className = 'preview-item';
                        previewWrapper.appendChild(videoDom);
                    }
                };
            });
            setTimeout(() => { document.getElementById('upload-status').innerText = "✨ تم ربط وتأمين وسائط الألبوم!"; }, 1200);
        });

        document.getElementById('saudi-property-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const finalMedia = loadedMediaArray.length > 0 ? loadedMediaArray : [{ type: 'image', data: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80' }];

            // دمج الإحداثيات الجغرافية الحية لتسليمها لصفحة الزبائن
            var propertyObj = {
                id: 'prop_' + Date.now(),
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value,
                phone: document.getElementById('phone').value.replace(/\s+/g, ''),
                area: document.getElementById('area').value,
                rooms: document.getElementById('details').value,
                media_list: finalMedia
            };
            
            var currentData = localStorage.getItem('saudi_property_vault');
            var dataArray = currentData ? JSON.parse(currentData) : [];
            dataArray.unshift(propertyObj);
            localStorage.setItem('saudi_property_vault', JSON.stringify(dataArray));
            
            document.getElementById('success-box').style.display = 'block';
            setTimeout(function() { window.location.href = 'dashboard.html'; }, 1000);
        });
    </script>
</body>
</html>
