<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة عقار جديد - نظام الضغط الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #10b981; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: #0b1329 !important; font-weight: 900; box-shadow: 0 0 12px rgba(16,185,129,0.3); }
        
        .form-container { background: #1c2541; border-radius: 16px; padding: 20px; border: 1px solid #2e3c63; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0b1329; border: 1px solid #2e3c63; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #10b981; outline: none; }
        
        /* تصميم مخصص واحترافي لزر رفع الصور */
        .file-dropzone { border: 2px dashed #3a4b7c; padding: 15px; border-radius: 8px; text-align: center; background: #0b1329; cursor: pointer; transition: 0.2s; }
        .file-dropzone:hover { border-color: #10b981; }
        .file-dropzone i { font-size: 24px; color: #10b981; margin-bottom: 6px; }
        .file-dropzone p { margin: 0; font-size: 11px; color: #94a3b8; }
        .preview-box { display: none; width: 100%; height: 120px; object-fit: cover; border-radius: 6px; margin-top: 10px; border: 1px solid #10b981; }
        
        .submit-btn { width: 100%; padding: 14px; background: #10b981; border: none; border-radius: 8px; color: #0b1329; font-size: 14px; font-weight: 900; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .submit-btn:hover { background: #059669; }
        .success-msg { display: none; color: #10b981; font-size: 12px; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-circle-plus"></i> إدارة المحتوى <span>المستقل المحسن</span></div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn"><i class="fa-solid fa-chart-line"></i> تحليلات المحفظة</a>
            <a href="add.html" class="tab-btn active"><i class="fa-solid fa-circle-plus"></i> إضافة عقار جديد</a>
        </div>

        <div class="form-container">
            <form id="property-form">
                <div class="form-group">
                    <label>عنوان العقار:</label>
                    <input type="text" id="title" placeholder="مثال: فيلا ملكية مودرن" required>
                </div>
                <div class="form-group">
                    <label>السعر (بالدولار $):</label>
                    <input type="number" id="price" placeholder="مثال: 450000" required>
                </div>
                <div class="form-group">
                    <label>الموقع / المدينة:</label>
                    <input type="text" id="location" placeholder="مثال: حلب - الشهباء" required>
                </div>
                <div class="form-group">
                    <label>المساحة (متر مربع):</label>
                    <input type="number" id="area" placeholder="مثال: 200" required>
                </div>
                <div class="form-group">
                    <label>عدد الغرف والتفاصيل:</label>
                    <input type="text" id="details" placeholder="مثال: 4 غرف وصالون" required>
                </div>
                
                <div class="form-group">
                    <label>صورة العقار (الرفع المباشر السريع من الجوال):</label>
                    <div class="file-dropzone" onclick="document.getElementById('imageFile').click()">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="upload-status">اضغط هنا لاختيار صورة من استوديو الجوال</p>
                        <input type="file" id="imageFile" accept="image/*" style="display: none;">
                    </div>
                    <img id="imagePreview" class="preview-box">
                </div>

                <button type="submit" class="submit-btn">معالجة وحفظ العقار فوراً</button>
                <div class="success-msg" id="success-box">✨ تم ضغط الصورة وحفظ المعطيات حياً! جاري التوجيه...</div>
            </form>
        </div>
    </div>

    <script>
        let compressedImageBase64 = "";

        // محرك القراءة والضغط الفوري لمنع بطء الموقع
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('upload-status').innerText = "جاري معالجة وضغط الصورة...";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    // إعداد أبعاد مرنة ومثالية للعرض السريع
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // تحويل الصورة لنص مضغوط جداً بجودة 70% لمنع استهلاك الذاكرة والبطء
                    compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // إظهار المعاينة الفورية للعميل
                    const preview = document.getElementById('imagePreview');
                    preview.src = compressedImageBase64;
                    preview.style.display = 'block';
                    document.getElementById('upload-status').innerText = "✨ تم معالجة الصورة بنجاح وتجهيزها للحفظ الفوري!";
                }
            }
        });

        document.getElementById('property-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var priceInput = document.getElementById('price').value;
            
            var newProperty = {
                id: 'prop_' + Date.now(),
                title: document.getElementById('title').value,
                price: parseFloat(priceInput),
                location: document.getElementById('location').value,
                area: document.getElementById('area').value,
                rooms: document.getElementById('details').value,
                // إذا لم يختر العميل صورة نضع له صورة الأيقونة الفاخرة الافتراضية
                main_img: compressedImageBase64 || 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'
            };
            
            var currentProperties = localStorage.getItem('global_properties_list');
            var propertiesArray = currentProperties ? JSON.parse(currentProperties) : [];
            
            propertiesArray.unshift(newProperty);
            localStorage.setItem('global_properties_list', JSON.stringify(propertiesArray));
            
            document.getElementById('success-box').style.display = 'block';
            
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
