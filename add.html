<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة عقار جديد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #10b981; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: #0b1329 !important; font-weight: 900; box-shadow: 0 0 12px rgba(16,185,129,0.3); }
        
        .form-container { background: #1c2541; border-radius: 16px; padding: 20px; border: 1px solid #2e3c63; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0b1329; border: 1px solid #2e3c63; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #10b981; outline: none; }
        .submit-btn { width: 100%; padding: 14px; background: #10b981; border: none; border-radius: 8px; color: #0b1329; font-size: 14px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .submit-btn:hover { background: #059669; }
        .msg { display: none; font-size: 12px; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-circle-plus"></i> إدارة المحتوى <span>العقاري الذكي</span></div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn"><i class="fa-solid fa-chart-line"></i> تحليلات المحفظة</a>
            <a href="add.html" class="tab-btn active"><i class="fa-solid fa-circle-plus"></i> إضافة عقار جديد</a>
        </div>

        <div class="form-container">
            <form id="property-form">
                <div class="form-group">
                    <label>عنوان العقار:</label>
                    <input type="text" id="title" placeholder="مثال: قصر فاخر بدمشق" required>
                </div>
                <div class="form-group">
                    <label>السعر ($):</label>
                    <input type="number" id="price" placeholder="مثال: 750000" required>
                </div>
                <div class="form-group">
                    <label>الموقع / المدينة:</label>
                    <input type="text" id="location" placeholder="مثال: دمشق - تنظيم كفرسوسة" required>
                </div>
                <div class="form-group">
                    <label>المساحة (متر مربع):</label>
                    <input type="number" id="area" placeholder="مثال: 380" required>
                </div>
                <div class="form-group">
                    <label>عدد الغرف والتفاصيل:</label>
                    <input type="text" id="details" placeholder="مثال: 5 غرف - 4 حمامات" required>
                </div>
                <div class="form-group">
                    <label>رابط الصورة الرئيسية للعقار:</label>
                    <input type="url" id="image" placeholder="أدخل رابط الصورة أو اتركه فارغاً للصورة الافتراضية">
                </div>

                <button type="submit" class="submit-btn" id="btnText">حفظ العقار ونشره فوراً</button>
                <div class="msg" id="msg-box"></div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20";

        document.getElementById('property-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnText');
            const msgBox = document.getElementById('msg-box');
            
            btn.innerText = "جاري النشر المعزز...";
            btn.disabled = true;

            const priceVal = document.getElementById('price').value;
            const propertyData = {
                title: document.getElementById('title').value,
                price: parseFloat(priceVal),
                location: document.getElementById('location').value,
                area: parseInt(document.getElementById('area').value),
                rooms: document.getElementById('details').value,
                main_img: document.getElementById('image').value || 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'
            };

            // إنشاء نسخة محلية احتياطية تحسباً لفشل شبكة الـ VPN
            const offlineItem = {
                id: 'offline_' + Date.now(),
                ...propertyData
            };

            try {
                // محاولة الرفع للسيرفر السحابي
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(propertyData)
                });

                if (response.ok) {
                    localStorage.setItem('last_added_price', priceVal);
                    msgBox.style.color = "#10b981";
                    msgBox.innerText = "✨ رائع! تم النشر السحابي، جاري التحويل لوحة التحكم...";
                } else {
                    throw new Error("حجب الشبكة");
                }

            } catch (error) {
                // تفعيل وضع التخزين الهجين عند حدوث خطأ الشبكة لضمان ظهور العقار فوراً للعميل
                let currentLocal = localStorage.getItem('backup_property_data');
                let localArray = currentLocal ? JSON.parse(currentLocal) : [];
                if (!Array.isArray(localArray)) localArray = [];
                
                localArray.unshift(offlineItem);
                localStorage.setItem('backup_property_data', JSON.stringify(localArray));
                
                // حفظ السعر لتحديث لوحة التحكم أيضاً حياً
                localStorage.setItem('last_added_price', priceVal);

                msgBox.style.color = "#f59e0b";
                msgBox.innerText = "⚡ تم الحفظ في الوضع المحلي الاحتياطي بنجاح بسبب قيود الشبكة!";
            }

            msgBox.style.display = "block";
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
