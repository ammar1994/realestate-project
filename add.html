<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة عقار جديد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #10b981; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: #0b1329 !important; font-weight: 900; box-shadow: 0 0 12px rgba(16,185,129,0.3); }
        
        .form-container { background: #1c2541; border-radius: 16px; padding: 20px; border: 1px solid #2e3c63; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0b1329; border: 1px solid #2e3c63; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #10b981; outline: none; }
        .submit-btn { width: 100%; padding: 14px; background: #10b981; border: none; border-radius: 8px; color: #0b1329; font-size: 14px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .submit-btn:hover { background: #059669; }
        .success-msg { display: none; color: #10b981; font-size: 12px; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-circle-plus"></i> إدارة المحتوى <span>العقاري</span></div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn"><i class="fa-solid fa-chart-line"></i> تحليلات المحفظة</a>
            <a href="add.html" class="tab-btn active"><i class="fa-solid fa-circle-plus"></i> إضافة عقار جديد</a>
        </div>

        <div class="form-container">
            <form id="property-form">
                <div class="form-group">
                    <label>عنوان العقار:</label>
                    <input type="text" id="title" placeholder="مثال: فيلا ملكية فاخرة" required>
                </div>
                <div class="form-group">
                    <label>السعر (بالدولار $):</label>
                    <input type="number" id="price" placeholder="مثال: 500000" required>
                </div>
                <div class="form-group">
                    <label>الموقع / المدينة:</label>
                    <input type="text" id="location" placeholder="مثال: دبي - نخلة جميرا" required>
                </div>
                <div class="form-group">
                    <label>المساحة (متر مربع):</label>
                    <input type="number" id="area" placeholder="مثال: 250" required>
                </div>
                <div class="form-group">
                    <label>عدد الغرف والتفاصيل:</label>
                    <input type="text" id="details" placeholder="مثال: 5 غرف - 4 حمامات" required>
                </div>
                <div class="form-group">
                    <label>رابط الصورة الرئيسية للعقار:</label>
                    <input type="url" id="image" placeholder="https://example.com/image.jpg">
                </div>

                <button type="submit" class="submit-btn">حفظ العقار ونشره فوراً</button>
                <div class="success-msg" id="success-box">✨ تم الحفظ بنجاح! جاري تحويلك للوحة التحكم...</div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('property-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // تجميع كل المدخلات في كائن واحد (Object) لصفحة الزبون
            var propertyData = {
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value).toLocaleString(),
                location: document.getElementById('location').value,
                area: document.getElementById('area').value,
                details: document.getElementById('details').value,
                // إذا لم يضع صورة نضع صورة افتراضية فاخرة
                image: document.getElementById('image').value || 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'
            };
            
            // حفظ الكائن كامل لصفحة الزبون
            localStorage.setItem('new_client_property', JSON.stringify(propertyData));
            
            // حفظ السعر منفصلاً للوحة التحكم كما كان سابقاً
            localStorage.setItem('last_added_price', document.getElementById('price').value);
            
            document.getElementById('success-box').style.display = 'block';
            
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1200);
        });
    </script>
</body>
</html>
