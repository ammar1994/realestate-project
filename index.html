<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض العقارات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1329;
            margin: 0;
            padding: 20px;
            color: #f8fafc;
        }
        h1 {
            text-align: center;
            color: #f59e0b;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 30px;
        }
        .properties-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .property-card {
            background: #1c2541;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e3c63;
            position: relative;
        }
        .property-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background-color: #141d36;
        }
        .property-details {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(245, 158, 11, 0.9);
            color: #0b1329;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .property-title {
            font-size: 14px;
            font-weight: bold;
            color: #f8fafc;
            margin: 0 0 8px 0;
        }
        .property-price {
            color: #f59e0b;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .property-desc {
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .property-meta {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(46, 60, 99, 0.4);
            padding-top: 8px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }
        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        .btn-whatsapp { background-color: #25d366; }
        .btn-media { background-color: #3b82f6; }
        .btn-map { background-color: #4b5563; }
        .loading-text {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            grid-column: 1 / -1;
            padding: 40px;
        }
        .nav-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            color: #f59e0b;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>معرض العقارات</h1>
    <p class="subtitle">عرض مباشر للعقارات والمشاريع السكنية الحالية</p>
    <a href="dashboard.html" class="nav-link">الدخول إلى لوحة التحكم</a>
    
    <div class="properties-container" id="propertiesWrapper">
        <div class="loading-text">جاري جلب البيانات الحية...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20"; 

        async function fetchProperties() {
            const wrapper = document.getElementById('propertiesWrapper');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('خطأ في الاتصال بالسيرفر');
                
                const properties = await response.json();
                wrapper.innerHTML = '';
                
                if (properties.length === 0) {
                    wrapper.innerHTML = '<div class="loading-text">لا توجد عقارات معروضة حالياً.</div>';
                    return;
                }
                
                properties.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'property-card';
                    
                    const pType = item.property_type || "شقة";
                    const pDesc = item.description || "لا يوجد وصف إضافي متوفر.";
                    
                    // استخراج أول صورة من المصفوفة المرفوعة إن وجدت، وإلا نستخدم صورة افتراضية
                    let mainImage = 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80';
                    if (item.media_list && item.media_list.length > 0) {
                        const firstMedia = item.media_list[0];
                        if (firstMedia.type === 'image') {
                            mainImage = firstMedia.data;
                        }
                    } else if (item.main_img) {
                        mainImage = item.main_img;
                    }
                    
                    // الترحيب التلقائي في الواتساب فقط
                    const messageText = encodeURIComponent(`السلام عليكم، أريد الاستفسار عن عقار: (${item.title}) المعروض بسعر (${Number(item.price).toLocaleString()} ريال). هل هو متاح؟`);
                    const whatsappUrl = `https://wa.me/${item.phone || '966500000000'}?text=${messageText}`;
                    
                    const mapUrl = (item.lat && item.lng) ? `https://maps.google.com/?q=${item.lat},${item.lng}` : '#';

                    card.innerHTML = `
                        <span class="type-badge">${pType}</span>
                        <img src="${mainImage}" class="property-img" alt="${item.title}">
                        <div class="property-details">
                            <div class="property-price">${Number(item.price).toLocaleString()} ر.س</div>
                            <h3 class="property-title">${item.title}</h3>
                            <p class="property-desc">${pDesc}</p>
                            <div class="property-meta">
                                <span>📍 ${item.location}</span>
                                <span>📐 ${item.area} م²</span>
                            </div>
                            <div class="property-meta" style="border:none; padding:0; margin-bottom:12px;">
                                <span>🚪 التفاصيل: ${item.rooms}</span>
                            </div>
                            <div class="action-buttons">
                                <a href="${whatsappUrl}" target="_blank" class="btn-action btn-whatsapp">تواصل واتساب</a>
                                <a href="details.html?id=${item.id}" class="btn-action btn-media">معاينة الوسائط</a>
                                <a href="${mapUrl}" target="_blank" class="btn-action btn-map">الموقع</a>
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(card);
                });
                
            } catch (error) {
                console.error(error);
                wrapper.innerHTML = '<div class="loading-text" style="color:#ef4444;">حدث خطأ أثناء تحميل البيانات. يرجى التأكد من اتصال الإنترنت.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchProperties);
    </script>
</body>
</html>
