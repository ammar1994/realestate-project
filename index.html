<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض العقارات الاحترافي</title>
    <style>
        /* تنسيقات مرنة وحديثة متوافقة مع جميع الشاشات */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        /* شبكة عرض مرنة: تتشكل وتترتب تلقائياً حسب حجم الشاشة */
        .properties-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* كرت العقار: أصبح رابطاً بالكامل ليفتح التفاصيل عند الضغط عليه */
        .property-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }
        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .property-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #ddd;
        }
        .property-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .property-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }
        .property-price {
            color: #e74c3c;
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .property-meta {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .loading-text {
            text-align: center;
            font-size: 1.2rem;
            color: #7f8c8d;
            grid-column: 1 / -1;
            padding: 40px;
        }
        .nav-buttons {
            text-align: center;
            margin-bottom: 30px;
        }
        .add-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .add-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>معرض العقارات المتاحة</h1>
    
    <div class="nav-buttons">
        <a href="add.html" class="add-btn">➕ إضافة عقار جديد</a>
    </div>

    <div class="properties-container" id="propertiesWrapper">
        <div class="loading-text">جاري جلب العقارات الحية من السيرفر السحابي...</div>
    </div>

    <script>
        // إعدادات الاتصال بالسيرفر
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20"; 

        async function fetchProperties() {
            const wrapper = document.getElementById('propertiesWrapper');
            let properties = [];

            try {
                // محاولة جلب البيانات من السيرفر أولاً
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    properties = await response.json();
                }
            } catch (error) {
                console.log("السيرفر غير متاح حالياً، سيتم الاعتماد على الذاكرة المحلية فقط.");
            }

            // تصفير الحاوية لبدء بناء العروض
            wrapper.innerHTML = ''; 

            // --- 💡 هندسة الدمج الذكي لعقار عمار الجديد من الذاكرة المحلية 💡 ---
            const savedProperty = localStorage.getItem('new_client_property');
            if (savedProperty) {
                try {
                    const localData = JSON.parse(savedProperty);
                    
                    // تحويل وتجهيز البيانات لتتطابق تماماً مع تركيبة جداول الموقع الأصلي
                    const localItem = {
                        id: 'local_' + Date.now(),
                        title: localData.title || 'عقار جديد مضاف',
                        price: (localData.price || '0').replace(/[^0-9]/g, ''), // تنظيف السعر ليكون رقماً نقياً
                        location: localData.location || 'غير محدد',
                        area: localData.area || '--',
                        rooms: localData.details || '--',
                        main_img: localData.image || 'villa.jpg'
                    };
                    
                    // حقن العقار الجديد في أول المصفوفة (الأولوية القصوى للعرض في البداية)
                    properties.unshift(localItem);
                } catch (e) {
                    console.error("خطأ في قراءة بيانات العقار المحلي:", e);
                }
            }

            // إذا كانت المصفوفة فارغة تماماً ولم يجد أي عقار
            if (properties.length === 0) {
                wrapper.innerHTML = '<div class="loading-text">لا توجد عقارات مضافة حالياً. اذهب للوحة التحكم وأضف أول عقار!</div>';
                return;
            }
            
            // حلقة بناء الكروت وعرضها على الشاشة
            properties.forEach(item => {
                const card = document.createElement('a');
                // إذا كان العقار محلياً يربطه بصفحة وهمية أو تفاصيل، وإذا كان من السيرفر يوجهه لصفحته المعتادة
                card.href = item.id.toString().startsWith('local_') ? '#' : `details.html?id=${item.id}`; 
                card.className = 'property-card';
                
                // تنسيق وعرض السعر بالعملة المعتمدة في كودك الأصلي
                const formattedPrice = Number(item.price).toLocaleString();

                card.innerHTML = `
                    <img src="${item.main_img}" class="property-img" onerror="this.src='https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80'" alt="${item.title}">
                    <div class="property-details">
                        <h3 class="property-title">${item.title}</h3>
                        <div class="property-price">${formattedPrice} ل.س</div>
                        <div class="property-meta">
                            <span>📍 ${item.location}</span>
                            <span>📐 ${item.area} م²</span>
                        </div>
                        <div class="property-meta">
                            <span>🚪 ${item.rooms}</span>
                        </div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        // تشغيل الدالة تلقائياً بمجرد تحميل الصفحة
        document.addEventListener('DOMContentLoaded', fetchProperties);
    </script>
</body>
</html>
