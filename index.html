<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالة العروض الحصرية - عقارات PREMIUM</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1329;
            margin: 0;
            padding: 20px;
            color: #f8fafc;
        }
        h1 {
            text-align: center;
            color: #f59e0b;
            margin-bottom: 5px;
            font-size: 2rem;
            font-weight: 800;
        }
        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .nav-buttons {
            text-align: center;
            margin-bottom: 30px;
        }
        .add-btn {
            display: inline-block;
            padding: 10px 24px;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s;
        }
        .add-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }
        .properties-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .property-card {
            background: #1c2541;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #2e3c63;
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .property-card:hover {
            transform: translateY(-5px);
        }
        .property-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            background-color: #141d36;
        }
        .property-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .property-price {
            color: #f59e0b;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .property-title {
            font-size: 16px;
            font-weight: bold;
            color: #f8fafc;
            margin: 0 0 12px 0;
            line-height: 1.4;
        }
        .property-meta {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(46, 60, 99, 0.4);
            padding-top: 10px;
        }
        .loading-text {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            grid-column: 1 / -1;
            padding: 50px;
        }
    </style>
</head>
<body>

    <h1>عقاراتي PREMIUM</h1>
    <p class="subtitle">صالة العروض الحصرية للاستثمار العقاري المباشر</p>
    
    <div class="nav-buttons">
        <a href="dashboard.html" class="add-btn">💼 لوحة التحكم الشاملة</a>
    </div>

    <div class="properties-container" id="propertiesWrapper">
        <div class="loading-text">جاري الاتصال الآمن بالسيرفر وجلب الأصول...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20"; 

        async function fetchProperties() {
            const wrapper = document.getElementById('propertiesWrapper');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('Network error');
                
                const properties = await response.json();
                wrapper.innerHTML = '';
                
                if (properties.length === 0) {
                    wrapper.innerHTML = '<div class="loading-text">لا توجد عقارات معروضة حالياً.</div>';
                    return;
                }
                
                properties.forEach(item => {
                    const card = document.createElement('a');
                    card.href = `details.html?id=${item.id}`;
                    card.className = 'property-card';
                    
                    let mainImage = 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80';
                    
                    if (item.media_list && item.media_list.length > 0) {
                        const firstMedia = item.media_list[0];
                        if (firstMedia && firstMedia.data) mainImage = firstMedia.data;
                    } else if (item.main_img) {
                        mainImage = item.main_img;
                    }
                    
                    card.innerHTML = `
                        <img src="${mainImage}" class="property-img" alt="${item.title}">
                        <div class="property-details">
                            <div class="property-price">${Number(item.price).toLocaleString()} ر.س</div>
                            <h3 class="property-title">${item.title}</h3>
                            <div class="property-meta">
                                <span>📍 ${item.location || 'دمشق'}</span>
                                <span>📐 ${item.area || '0'} م²</span>
                            </div>
                            <div class="property-meta" style="border:none; padding:0;">
                                <span>🚪 التفاصيل: ${item.rooms || 'غير محدد'}</span>
                            </div>
                        </div>
                    `;
                    wrapper.appendChild(card);
                });
                
            } catch (error) {
                console.error(error);
                wrapper.innerHTML = '<div class="loading-text" style="color:#ef4444;">حدث خطأ أثناء تحميل البيانات الحية من الخادم.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchProperties);
    </script>
</body>
</html>
