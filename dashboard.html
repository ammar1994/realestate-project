<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم الاستثمارية الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #10b981; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: #0b1329 !important; font-weight: 900; box-shadow: 0 0 12px rgba(16,185,129,0.3); }
        
        .analytics-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
        .analytics-card { color: white; padding: 14px; border-radius: 12px; text-align: center; flex: 1; min-width: 95px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .stat-card { background: #1c2541; border-radius: 14px; padding: 14px; border: 1px solid #2e3c63; display: flex; align-items: center; justify-content: space-between; }
        .stat-val { font-size: 16px; font-weight: 900; color: white; margin-top: 4px; }
        .stat-card i { font-size: 20px; color: #10b981; }
        
        .chart-box, .table-box { background: #1c2541; border-radius: 16px; padding: 16px; border: 1px solid #2e3c63; margin-bottom: 20px; }
        .chart-box h3, .table-box h3 { margin: 0 0 14px 0; font-size: 13px; color: #10b981; font-weight: 800; }
        
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 11px; }
        th { color: #94a3b8; padding-bottom: 10px; border-bottom: 1px solid #2e3c63; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(46, 60, 99, 0.4); }
        
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; transition: 0.2s; }
        .delete-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-gauge-high"></i> لوحة التحكم <span>العقارية الشاملة</span></div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn active"><i class="fa-solid fa-chart-line"></i> تحليلات المحفظة</a>
            <a href="add.html" class="tab-btn" style="border-color: #10b981; color: #10b981;"><i class="fa-solid fa-circle-plus"></i> إضافة عقار جديد</a>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">صافي الأرباح الاستثمارية</span>
                    <div class="stat-val" id="total-profit">$342,000</div>
                </div>
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">إجمالي الاستثمارات المعروضة</span>
                    <div class="stat-val" id="total-assets">$4,850,000</div>
                </div>
                <i class="fa-solid fa-wallet"></i>
            </div>
        </div>

        <div class="table-box">
            <h3><i class="fa-solid fa-building-circle-xmark"></i> العقارات المنشورة حياً (تحكم العميل المباشر بالحذف)</h3>
            <table>
                <thead>
                    <tr>
                        <th>اسم العقار المعروض</th>
                        <th>السعر المدرج</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="management-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function renderManagementTable() {
            var tableBody = document.getElementById('management-table-body');
            var currentProperties = localStorage.getItem('global_properties_list');
            var propertiesArray = currentProperties ? JSON.parse(currentProperties) : [];
            
            tableBody.innerHTML = '';
            
            if(propertiesArray.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:15px;">لا توجد عقارات مضافة بيدك حالياً.</td></tr>';
                return;
            }
            
            propertiesArray.forEach(function(item) {
                var row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:bold; color:white;">${item.title}</td>
                    <td style="color:#f59e0b;">$${Number(item.price).toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteProperty('${item.id}')"><i class="fa-solid fa-trash"></i> حذف ونزع فوراً</button></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function deleteProperty(propertyId) {
            if(confirm("هل أنت متأكد من رغبتك في حذف هذا العقار ونزعه نهائياً من واجهة الزبائن؟")) {
                var currentProperties = localStorage.getItem('global_properties_list');
                var propertiesArray = currentProperties ? JSON.parse(currentProperties) : [];
                
                // تصفية المصفوفة واستثناء العنصر المحذوف
                var updatedArray = propertiesArray.filter(function(item) {
                    return item.id !== propertyId;
                });
                
                localStorage.setItem('global_properties_list', JSON.stringify(updatedArray));
                
                // إعادة التوليد فوراً على الشاشة لتحديث العرض للعميل
                renderManagementTable();
                updateCounters();
            }
        }

        function updateCounters() {
            var addedPrice = localStorage.getItem('last_added_price');
            if (addedPrice) {
                var priceNum = parseFloat(addedPrice);
                if(!isNaN(priceNum)) {
                    var currentAssets = 4850000 + priceNum;
                    document.getElementById('total-assets').innerText = '$' + currentAssets.toLocaleString();
                    var currentProfit = 342000 + (priceNum * 0.10);
                    document.getElementById('total-profit').innerText = '$' + currentProfit.toLocaleString();
                }
            }
        }

        window.onload = function() {
            renderManagementTable();
            updateCounters();
        };
    </script>
</body>
</html>
