<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأصول العقارية الاستثمارية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b1329;
            --bg-card: #1c2541;
            --border-color: #2e3c63;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* كروت الإحصائيات الحية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stat-info h3 {
            margin: 0 0 5px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stat-info p {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-gold);
        }

        /* قسم إدارة وإدخال البيانات */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 992px) {
            .main-grid { grid-template-columns: 380px 1fr; }
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            height: fit-content;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            margin-0: 0 0 20px 0;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            color: var(--text-primary);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-gold), #d97706);
            color: var(--bg-main);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        /* جدول العروض المنشورة مخصص للتعامل مع الشاشات الصغيرة */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 13px;
        }

        th {
            background: var(--bg-main);
            color: var(--text-secondary);
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .table-img {
            width: 50px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: var(--accent-red);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1><i class="fa-solid fa-chart-line" style="color: var(--accent-gold);"></i> لوحة تحكم المحفظة العقارية الحية</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>إجمالي الأصول العقارية</h3>
                    <p id="statCount">0</p>
                </div>
                <div class="stat-icon"><i class="fa-solid fa-building"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>حجم الاستثمار الكلي</h3>
                    <p id="statTotalVolume">0 ر.س</p>
                </div>
                <div class="stat-icon"><i class="fa-solid fa-vault"></i></div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h2 class="panel-title"><i class="fa-solid fa-plus-circle"></i> نشر أصل استثماري جديد</h2>
                <form id="propertyForm" onsubmit="saveNewProperty(event)">
                    <div class="form-group">
                        <label>عنوان العقار الاستثماري</label>
                        <input type="text" id="pTitle" class="form-control" placeholder="مثال: فيلا قصر مودرن بحي حطين" required>
                    </div>
                    <div class="form-group">
                        <label>القيمة المالية للعقار (ر.س)</label>
                        <input type="number" id="pPrice" class="form-control" placeholder="مثال: 4500000" required>
                    </div>
                    <div class="form-group">
                        <label>المدينة / الموقع الجغرافي نصياً</label>
                        <input type="text" id="pLocation" class="form-control" placeholder="مثال: الرياض، حي النرجس" required>
                    </div>
                    <div class="form-group">
                        <label>المساحة الإجمالية (م²)</label>
                        <input type="number" id="pArea" class="form-control" placeholder="مثال: 350" required>
                    </div>
                    <div class="form-group">
                        <label>رقم هاتف الواتساب للتواصل السعودي</label>
                        <input type="text" id="pPhone" class="form-control" placeholder="مثال: 966500000000" required>
                    </div>
                    <div class="form-group">
                        <label>إحداثيات خط العرض (Latitude)</label>
                        <input type="number" step="any" id="pLat" class="form-control" placeholder="مثال: 24.7136" required>
                    </div>
                    <div class="form-group">
                        <label>إحداثيات خط الطول (Longitude)</label>
                        <input type="number" step="any" id="pLng" class="form-control" placeholder="مثال: 46.6753" required>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة الرئيسية (رابط مباشر)</label>
                        <input type="url" id="pImg1" class="form-control" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة الإضافية الثانية (رابط مباشر)</label>
                        <input type="url" id="pImg2" class="form-control" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة الإضافية الثالثة (رابط مباشر)</label>
                        <input type="url" id="pImg3" class="form-control" placeholder="https://...">
                    </div>
                    <button type="submit" class="btn-submit">تأكيد ونشر الأصل فوراً في المعرض</button>
                </form>
            </div>

            <div class="panel">
                <h2 class="panel-title"><i class="fa-solid fa-list-check"></i> العروض والملفات المدرجة حالياً في الصالة الحية</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>الصورة</th>
                                <th>العقار</th>
                                <th>الموقع</th>
                                <th>القيمة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderDashboard() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            const rawData = localStorage.getItem('saudi_property_vault');
            const properties = rawData ? JSON.parse(rawData) : [];
            
            let totalVolume = 0;
            document.getElementById('statCount').innerText = properties.length;
            
            if (properties.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 30px;">لا توجد أصول استثمارية منشورة حالياً بالمحفظة.</td></tr>`;
                document.getElementById('statTotalVolume').innerText = "0 ر.س";
                return;
            }

            properties.forEach(item => {
                totalVolume += Number(item.price || 0);
                const tr = document.createElement('tr');
                
                const firstImg = item.media_list && item.media_list[0] ? item.media_list[0].data : '';

                // استخدام إنشاء العناصر الآمن لتجنب ثغرات الحقن البرمجي وعرض الصور بشكل سليم
                tr.innerHTML = `
                    <td><img src="${firstImg}" class="table-img" alt="عقار"></td>
                    <td style="font-weight: 600;">${escapeHtml(item.title)}</td>
                    <td>${escapeHtml(item.location)}</td>
                    <td style="color: var(--accent-gold); font-weight: 700;">${Number(item.price).toLocaleString()} ر.س</td>
                    <td><button class="btn-delete" onclick="deleteProperty('${item.id}')"><i class="fa-solid fa-trash-can"></i> حذف</button></td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('statTotalVolume').innerText = totalVolume.toLocaleString() + " ر.س";
        }

        function saveNewProperty(e) {
            e.preventDefault();
            
            const rawData = localStorage.getItem('saudi_property_vault');
            const properties = rawData ? JSON.parse(rawData) : [];

            const media_list = [{ type: 'image', data: document.getElementById('pImg1').value }];
            const img2 = document.getElementById('pImg2').value;
            const img3 = document.getElementById('pImg3').value;
            
            if(img2) media_list.push({ type: 'image', data: img2 });
            if(img3) media_list.push({ type: 'image', data: img3 });

            const newObj = {
                id: 'prop_' + Date.now(),
                title: document.getElementById('pTitle').value,
                price: document.getElementById('pPrice').value,
                location: document.getElementById('pLocation').value,
                area: document.getElementById('pArea').value,
                phone: document.getElementById('pPhone').value,
                lat: document.getElementById('pLat').value,
                lng: document.getElementById('pLng').value,
                media_list: media_list
            };

            properties.push(newObj);
            localStorage.setItem('saudi_property_vault', JSON.stringify(properties));
            
            document.getElementById('propertyForm').reset();
            renderDashboard();
        }

        function deleteProperty(id) {
            const rawData = localStorage.getItem('saudi_property_vault');
            let properties = rawData ? JSON.parse(rawData) : [];
            properties = properties.filter(p => p.id !== id);
            localStorage.setItem('saudi_property_vault', JSON.stringify(properties));
            renderDashboard();
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        document.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
