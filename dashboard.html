<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم العقارية الحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #f59e0b; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border-color: #f59e0b; color: #0b1329 !important; font-weight: 900; box-shadow: 0 0 12px rgba(245,158,11,0.3); }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .stat-card { background: #1c2541; border-radius: 14px; padding: 14px; border: 1px solid #2e3c63; display: flex; align-items: center; justify-content: space-between; }
        .stat-val { font-size: 15px; font-weight: 900; color: #f59e0b; margin-top: 4px; }
        .stat-card i { font-size: 18px; color: #cbd5e1; }
        
        .table-box { background: #1c2541; border-radius: 16px; padding: 16px; border: 1px solid #2e3c63; margin-bottom: 20px; }
        .table-box h3 { margin: 0 0 14px 0; font-size: 13px; color: #f59e0b; font-weight: 800; }
        
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 11px; }
        th { color: #94a3b8; padding-bottom: 10px; border-bottom: 1px solid #2e3c63; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(46, 60, 99, 0.4); }
        
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .view-link { display: block; text-align: center; background: #10b981; color: #0b1329; padding: 11px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-chart-line"></i> نظام المتابعة <span>الحي والمباشر</span></div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn active"><i class="fa-solid fa-chart-pie"></i> لوحة الإحصائيات الحية</a>
            <a href="add.html" class="tab-btn" style="border-color: #f59e0b; color: #f59e0b;"><i class="fa-solid fa-plus-circle"></i> إضافة عقار جديد</a>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">حجم المحفظة المعروضة</span>
                    <div class="stat-val" id="real-assets-sum">0 ر.س</div>
                </div>
                <i class="fa-solid fa-vault"></i>
            </div>
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">عدد المشاريع الحية</span>
                    <div class="stat-val" id="real-assets-count">0 عقار</div>
                </div>
                <i class="fa-solid fa-building"></i>
            </div>
        </div>

        <div class="table-box">
            <h3><i class="fa-solid fa-list-check"></i> لوحة تحكم وإدارة عروض السوق الحالية</h3>
            <table>
                <thead>
                    <tr>
                        <th>المشروع</th>
                        <th>القيمة المالية</th>
                        <th>إجراء الحذف ونزع النشر</th>
                    </tr>
                </thead>
                <tbody id="saudi-table-body">
                    </tbody>
            </table>
            
            <a href="customer.html" target="_blank" class="view-link">👁️ فتح العرض العقاري للزبائن واختبار زر الـ WhatsApp</a>
        </div>
    </div>

    <script>
        function computeRealStats() {
            var currentData = localStorage.getItem('saudi_realestate_vault');
            var dataArray = currentData ? JSON.parse(currentData) : [];
            
            var sum = 0;
            var tableBody = document.getElementById('saudi-table-body');
            tableBody.innerHTML = '';
            
            if(dataArray.length === 0) {
                document.getElementById('real-assets-sum').innerText = "0 ر.س";
                document.getElementById('real-assets-count').innerText = "0 عقار";
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:20px;">المحفظة العقارية فارغة تماماً الآن. أضف مشاريعك لتبدأ الإحصائيات الحية.</td></tr>';
                return;
            }

            dataArray.forEach(function(item) {
                sum += parseFloat(item.price || 0);
                
                var row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:bold; color:white;">${item.title} <br><small style="color:#94a3b8;">📍 ${item.location}</small></td>
                    <td style="color:#f59e0b; font-weight:900;">${Number(item.price).toLocaleString()} ر.س</td>
                    <td><button class="delete-btn" onclick="removeSaudiProperty('${item.id}')"><i class="fa-solid fa-trash-can"></i> حذف نهائي</button></td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('real-assets-sum').innerText = sum.toLocaleString() + " ر.س";
            document.getElementById('real-assets-count').innerText = dataArray.length + " عقار حقيقي";
        }

        function removeSaudiProperty(id) {
            if(confirm("تأكيد إجراء الحذف؟ سيتم إزالة العقار فورا وتحديث لوحة الإحصائيات وواجهة العرض الحية للزبون.")) {
                var currentData = localStorage.getItem('saudi_realestate_vault');
                var dataArray = currentData ? JSON.parse(currentData) : [];
                
                var filtered = dataArray.filter(function(x) { return x.id !== id; });
                localStorage.setItem('saudi_realestate_vault', JSON.stringify(filtered));
                
                computeRealStats();
            }
        }

        window.onload = computeRealStats;
    </script>
</body>
</html>
