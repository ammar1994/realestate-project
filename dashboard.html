<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم العقارية الحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 15px; font-weight: 800; margin: 0; color: #f8fafc; }
        .logo span { color: #f59e0b; font-weight: 900; margin-right: 4px; }
        .content { padding: 20px 14px; }
        
        /* التعديل المطلوب 1: تنسيق أزرار التنقل العلوية */
        .top-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .add-btn-nav { flex: 1; text-align: center; background: #f59e0b; color: #0b1329; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; border: none; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .stat-card { background: #1c2541; border-radius: 14px; padding: 14px; border: 1px solid #2e3c63; display: flex; align-items: center; justify-content: space-between; }
        .stat-val { font-size: 15px; font-weight: 900; color: #f59e0b; margin-top: 4px; }
        .stat-card i { font-size: 18px; color: #cbd5e1; }
        
        .table-box { background: #1c2541; border-radius: 16px; padding: 16px; border: 1px solid #2e3c63; }
        .table-box h3 { margin: 0 0 14px 0; font-size: 13px; color: #f59e0b; font-weight: 800; }
        
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 11px; }
        th { color: #94a3b8; padding-bottom: 10px; border-bottom: 1px solid #2e3c63; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(46, 60, 99, 0.4); }
        
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .view-link { display: block; text-align: center; background: #10b981; color: #0b1329; padding: 11px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-chart-line"></i> لوحة تحكم المحفظة <span>الذكية</span></div>
    </nav>

    <div class="content">
        <div class="top-actions">
            <a href="add.html" class="add-btn-nav"><i class="fa-solid fa-plus"></i> إضافة عقار جديد للمحفظة</a>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">إجمالي حجم الاستثمار</span>
                    <div class="stat-val" id="assets-sum">0 ر.س</div>
                </div>
                <i class="fa-solid fa-vault"></i>
            </div>
            <div class="stat-card">
                <div>
                    <span style="color: #94a3b8; font-size: 10px;">عدد العروض النشطة</span>
                    <div class="stat-val" id="assets-count">0 عقار</div>
                </div>
                <i class="fa-solid fa-building"></i>
            </div>
        </div>

        <div class="table-box">
            <h3><i class="fa-solid fa-list-check"></i> إدارة عقارات السوق الحالية</h3>
            <table>
                <thead>
                    <tr>
                        <th>العقار المعروض</th>
                        <th>السعر الحالي</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
            
            <a href="customer.html" class="view-link">👁️ فتح واجهة صالة العروض العقارية للزبائن</a>
        </div>
    </div>

    <script>
        function loadLiveStats() {
            var currentData = localStorage.getItem('saudi_property_vault');
            var dataArray = currentData ? JSON.parse(currentData) : [];
            
            var totalSum = 0;
            var tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if(dataArray.length === 0) {
                document.getElementById('assets-sum').innerText = "0 ر.س";
                document.getElementById('assets-count').innerText = "0 عقار";
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:20px;">المحفظة خالية، يرجى إضافة عقارات جديدة لتبدأ الحسابات الحية.</td></tr>';
                return;
            }

            dataArray.forEach(function(item) {
                totalSum += parseFloat(item.price || 0);
                
                var row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:bold; color:white;">${item.title}<br><small style="color:#94a3b8;">📍 ${item.location}</small></td>
                    <td style="color:#f59e0b; font-weight:900;">${Number(item.price).toLocaleString()} ر.س</td>
                    <td><button class="delete-btn" onclick="deleteProperty('${item.id}')"><i class="fa-solid fa-trash"></i> حذف</button></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('assets-sum').innerText = totalSum.toLocaleString() + " ر.س";
            document.getElementById('assets-count').innerText = dataArray.length + " عقار نشط";
        }

        function deleteProperty(id) {
            if(confirm("هل تريد حذف هذا العقار نهائياً وتحديث الإحصائيات فوراً؟")) {
                var currentData = localStorage.getItem('saudi_property_vault');
                var dataArray = currentData ? JSON.parse(currentData) : [];
                var filtered = dataArray.filter(function(x) { return x.id !== id; });
                localStorage.setItem('saudi_property_vault', JSON.stringify(filtered));
                loadLiveStats();
            }
        }

        window.onload = loadLiveStats;
    </script>
</body>
</html>
