<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم وإدارة المحفظة</title>
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        nav { background: #1c2541; padding: 14px; border-bottom: 1px solid #2a375e; text-align: center; }
        .logo { font-size: 16px; font-weight: 800; margin: 0; color: #f8fafc; }
        .content { padding: 20px 14px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab-btn { flex: 1; background: #141d36; border: 1px solid #3a4b7c; color: #94a3b8; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; }
        .tab-btn.active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-color: #10b981; color: #0b1329 !important; font-weight: 900; }
        .table-box { background: #1c2541; border-radius: 16px; padding: 16px; border: 1px solid #2e3c63; margin-top: 20px; }
        .table-box h3 { margin: 0 0 14px 0; font-size: 13px; color: #10b981; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 11px; }
        th { color: #94a3b8; padding-bottom: 10px; border-bottom: 1px solid #2e3c63; }
        td { padding: 12px 0; border-bottom: 1px solid rgba(46, 60, 99, 0.4); }
        .action-btn { padding: 5px 8px; border: none; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; margin-left: 4px; }
        .btn-delete { background-color: #ef4444; }
        .btn-edit { background-color: #3b82f6; }
        .loading { text-align: center; padding: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">السلام عليكم، مرحباً بك في لوحة إدارة العمليات</div>
    </nav>

    <div class="content">
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab-btn active">إدارة العقارات الحالية</a>
            <a href="add.html" class="tab-btn" style="border-color: #10b981; color: #10b981;">➕ إضافة عقار جديد</a>
            <a href="index.html" class="tab-btn" style="border-color: #3b82f6; color: #3b82f6;">🌐 عرض الموقع للزبائن</a>
        </div>

        <div class="table-box">
            <h3>قائمة العقارات المنشورة وإدارتها الحية</h3>
            <table>
                <thead>
                    <tr>
                        <th>اسم العقار المعروض</th>
                        <th>السعر المدرج</th>
                        <th>الإجراءات والتحكم</th>
                    </tr>
                </thead>
                <tbody id="propertiesTableBody">
                    <tr>
                        <td colspan="3" class="loading">جاري تحميل العقارات من قاعدة البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://plfibajexgugqhunmepv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsZmliYWpleGd1Z3FodW5tZXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0Mjk0MTcsImV4cCI6MjA2NDAwNTQxN30.0b_XbQhVz8v0w7XhWhS8xJ4367bB_m7G8P6N2C1mZ20"; 

        let globalProperties = [];

        async function loadDashboardData() {
            const tbody = document.getElementById('propertiesTableBody');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('خطأ في جلب البيانات');

                globalProperties = await response.json();
                tbody.innerHTML = '';

                if (globalProperties.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="loading">لا توجد عقارات منشورة حالياً.</td></tr>';
                    return;
                }

                globalProperties.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>[${item.property_type || 'عقار'}]</strong> ${item.title}</td>
                        <td>${Number(item.price).toLocaleString()} ل.س</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editProperty(${index})">📝 تعديل</button>
                            <button class="action-btn btn-delete" onclick="deleteProperty('${item.id}')">🗑️ حذف</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="3" class="loading" style="color:#ef4444;">حدث خطأ أثناء جلب البيانات الحية.</td></tr>';
            }
        }

        // دالة التعديل: تقوم بتجهيز البيانات ونقل المستخدم إلى صفحة الإدخال مع الحفاظ على البيانات السابقة
        function editProperty(index) {
            const property = globalProperties[index];
            localStorage.setItem('edit_property_data', JSON.stringify(property));
            window.location.href = `add.html?edit_id=${property.id}`;
        }

        async function deleteProperty(id) {
            if (!confirm('هل أنت متأكد من رغبتك في حذف هذا العقار نهائياً من السيرفر؟')) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/properties?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('فشلت عملية الحذف');

                alert('تم حذف العقار ونزع العرض بنجاح.');
                loadDashboardData();

            } catch (error) {
                console.error(error);
                alert('حدث خطأ أثناء محاولة الحذف، يرجى التحقق من اتصال الإنترنت.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
