<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة الإدارة والمحفظة العقارية</title>
    <style>
        :root { /* ... (نفس المتغيرات السابقة) ... */ }
        
        /* التعديلات الجوهرية للجوال */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; font-family: 'Cairo', sans-serif; }
        
        .main-content { width: 100%; }
        .dashboard-container { padding: 10px; width: 100%; }
        
        /* جعل الجدول يتجاوب بشكل كامل */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 500px; /* ضمان عدم انضغاط الجدول */ }

        /* تعديلات الخريطة للجوال */
        #mini-map-picker { width: 100%; height: 200px; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; right: -100%; }
            .sidebar.active { right: 0; }
            .stats-grid { grid-template-columns: 1fr; }
            .main-grid { grid-template-columns: 1fr !important; }
            .top-header { padding: 10px; }
        }
        
        /* إضافة ستايل إضافي لضمان عدم خروج أي عنصر */
        img, video, .form-control { max-width: 100%; }
    </style>
</head>

</html>
